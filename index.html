          '<td class="num">' + fmt(sale.cents) + '</td>' +
          '<td>' + dangerBtn('del-fundraiser-sale:' + fr.id + ':' + sale.id, 'Delete') + '</td></tr>';
      });
      h += '</tbody></table></div>';
    }

    // Total raised vs goal.
    h += '<p class="small" style="margin:8px 0 0"><strong class="money">' + fmt(ft.total) + '</strong> raised' +
      (fr.goalCents > 0
        ? ' of <span class="money">' + fmt(fr.goalCents) + '</span> goal (' + Math.min(100, Math.round(ft.total / fr.goalCents * 100)) + '%)' +
          (showGoal ? ' · per-scout target <span class="money">' + fmt(perTarget) + '</span> across ' + activeCount + ' active scouts' : '')
        : '') +
      '</p></div>';
    return h;
  }

  /* ----- Wave 8: reward tiers card (Standings tab) ----- */

      '<label class="fld">Reward<input name="reward" placeholder="e.g. Pack pays dues" style="width:160px"></label>' +

  }

  /* ----- Wave 14: Inventory (Trail's End popcorn order) ----- */
  // Tracks the pack's popcorn order end-to-end: what was ordered, its projected value +
  // pack earnings, what's still on hand, and how many containers were handed to each
  // den/scout. Deliberately SEPARATE from the Budget — projected earnings here never
  // feed computeBudget()'s funds-in (that comes from actual recorded sales commission),
  // so the two can't double-count.
  function invProduct(id) { return state.inventory.products.find(function (p) { return p.id === id; }); }
  function containersOrdered(p) { return (p.perCase || 0) * (p.cases || 0); }
  function distributedContainers(productId) {
    var n = 0;
    state.inventory.distributions.forEach(function (d) { if (d.productId === productId) n += d.containers; });
    return n; // net of returns (negatives)
  }
  function onHand(p) { return containersOrdered(p) - distributedContainers(p.id); }
  function productValueCents(p) { return containersOrdered(p) * (p.unitPriceCents || 0); }
  function inventoryTotals() {
    var inv = state.inventory;
    var totalCases = 0, totalContainers = 0, computedValueCents = 0, anyPriced = false;
    inv.products.forEach(function (p) {
      totalCases += (p.cases || 0);
      totalContainers += containersOrdered(p);
      computedValueCents += productValueCents(p);
      if (p.unitPriceCents > 0) anyPriced = true;
    });
    var pct = parseFloat(inv.commissionPct);
    var pctOk = isFinite(pct) && pct > 0;
    var earningsCents = pctOk ? Math.round(inv.orderTotalCents * pct / 100) : 0;
    return {
      totalCases: totalCases, totalContainers: totalContainers,
      computedValueCents: computedValueCents, anyPriced: anyPriced,
      orderTotalCents: inv.orderTotalCents, pct: pct, pctOk: pctOk, earningsCents: earningsCents
    };
  }
  function distTargetName(t) {
    if (!t) return '—';
    if (t.kind === 'den') return t.den + ' den';
    // Wave 19(17) — trunk/storefront stock targets. Past storefronts still resolve by
    // name; a storefront that no longer exists renders with a fallback (hand-outs are
    // money-relevant logs and are never silently dropped).
    if (t.kind === 'trunk') return 'Storefront trunk stock';
    if (t.kind === 'storefront') {
      var tsf = getStorefront(t.id);
      return tsf ? ((tsf.name || 'Storefront') + (tsf.date ? ' (' + fmtDate(tsf.date) + ')' : '')) : '(removed storefront)';
    }
    var s = getScout(t.id);
    return s ? s.name : '(removed scout)';
  }
  function renderInventory() {
    var inv = state.inventory;
    var tot = inventoryTotals();

    // --- Order summary ---
    var h = '<div class="card"><h2 class="section display">Popcorn order</h2>' +
      '<p class="small muted" style="margin:0 0 10px">Your Trail’s End order — what you bought, what it earns the pack, and where it goes. ' +
      'Kept separate from the Budget on purpose.</p>' +
      '<div class="row">' +
      '<div class="stat"><span class="v">' + tot.totalCases + '</span><span class="l">Total cases</span></div>' +
      '<div class="stat"><span class="v">' + tot.totalContainers + '</span><span class="l">Total containers</span></div>' +
      '<div class="stat"><span class="v money" style="color:var(--accent-text)">' + (tot.pctOk ? fmt(tot.earningsCents) : '—') + '</span><span class="l">Pack earnings</span></div>' +
      '</div>' +
      '<hr class="divider">' +
      '<div class="row">' +
      '<label class="fld">Order total ($)<input class="money-in" inputmode="decimal" data-ch="inv-order-total" value="' + dollars(inv.orderTotalCents) + '" placeholder="e.g. 4380"></label>' +
      '<label class="fld">Commission (%)<input class="weight-in" type="number" min="0" max="100" step="0.1" inputmode="decimal" data-ch="inv-comm" value="' + esc(inv.commissionPct) + '" placeholder="e.g. 32"></label>' +
      '</div>' +
      (function () {
        // Wave 17 — flag a rate that drifted from the season rate in Season setup.
        var seasonPct = parseFloat(state.commissionPct);
        var invPct = parseFloat(inv.commissionPct);
        return (isFinite(seasonPct) && isFinite(invPct) && invPct !== seasonPct)
          ? '<p class="small muted" style="margin:6px 0 0">Differs from your season rate (' + invPct + '% vs ' + seasonPct + '%) — Season setup on the Budget tab.</p>'
          : '';
      })() +
      '<p class="small muted" style="margin:8px 0 0">Projected earnings shown here only — your Budget “funds in” still comes from actual recorded sales, so nothing is double-counted.</p>';
    if (tot.anyPriced && tot.computedValueCents !== tot.orderTotalCents) {
      h += '<p class="small muted" style="margin:6px 0 0">Priced items total <span class="money">' + fmt(tot.computedValueCents) + '</span>; order total is <span class="money">' + fmt(tot.orderTotalCents) + '</span>.</p>';
    }
    h += '</div>';

    // --- Products ---
    h += '<div class="card"><h2 class="section display">Products</h2>' +
      '<p class="small muted" style="margin:0 0 8px">Containers/case × cases = containers ordered. Unit price is optional — fill it in to see each product’s value.</p>';
    if (!inv.products.length) {
      // Wave 15 — empty state offers the standard lineup as a starting template (names +
      // containers/case only; cases and prices stay 0, order total untouched).
      h += '<div class="empty">No products yet.<br>' +
        '<button type="button" class="btn small primary" data-act="seed-te-lineup" style="margin-top:10px">Add the standard Trail’s End lineup</button>' +
        '<p class="small muted" style="margin:8px 0 0">Seeds the five usual varieties with containers per case — you fill in cases and prices. ' +
        'Or use <strong>+ Add product</strong> below for a custom lineup.</p></div>';
    } else {
      inv.products.forEach(function (p) {
        var ordered = containersOrdered(p);
        var hand = onHand(p);
        var handCls = hand < 0 ? ' style="color:var(--bad)"' : '';
        h += '<div class="erow">' +
          '<input class="ename" data-ch="inv-name" data-id="' + p.id + '" value="' + esc(p.name) + '" placeholder="Product name" aria-label="Product name">' +
          '<label class="inv-mini">Per case<input class="weight-in" type="number" min="0" step="1" inputmode="numeric" data-ch="inv-percase" data-id="' + p.id + '" value="' + (p.perCase || 0) + '" aria-label="Containers per case"></label>' +
          '<label class="inv-mini">Cases<input class="weight-in" type="number" min="0" step="1" inputmode="numeric" data-ch="inv-cases" data-id="' + p.id + '" value="' + (p.cases || 0) + '" aria-label="Cases ordered"></label>' +
          '<label class="inv-mini">Unit $<input class="money-in" inputmode="decimal" data-ch="inv-price" data-id="' + p.id + '" value="' + dollars(p.unitPriceCents) + '" placeholder="—" aria-label="Unit price"></label>' +
          '<span class="inv-derived">' + ordered + ' ordered · <strong' + handCls + '>' + hand + ' on hand</strong>' +
          (p.unitPriceCents > 0 ? ' · ' + fmt(productValueCents(p)) : '') + '</span>' +
          tinyDangerBtn('del-inv-product:' + p.id, 'Remove ' + (p.name || 'product')) +
          '</div>';
      });
    }
    h += '<div class="row" style="margin-top:10px"><button type="button" class="btn small" data-act="add-inv-product">+ Add product</button></div></div>';

    // --- Distribution: hand out + on-hand + out-by + log ---
    var roster = activeScouts();
    h += '<div class="card"><h2 class="section display">Hand out popcorn</h2>' +
      '<form data-form="add-distribution" class="row">' +
      '<label class="fld">Product<select name="product"' + (inv.products.length ? '' : ' disabled') + '>' +
      inv.products.map(function (p) { return '<option value="' + p.id + '">' + esc(p.name || 'Product') + '</option>'; }).join('') +
      '</select></label>' +
      '<label class="fld">To<select name="target">' +
      '<optgroup label="Dens">' + DENS.map(function (dn) { return '<option value="den:' + dn + '">' + dn + ' den</option>'; }).join('') + '</optgroup>' +
      (roster.length ? '<optgroup label="Scouts">' + roster.map(function (s) { return '<option value="scout:' + s.id + '">' + esc(s.name) + '</option>'; }).join('') + '</optgroup>' : '') +
      // Wave 19(17) — stock for a specific upcoming storefront, or the generic trunk.
      '<optgroup label="Storefronts">' +
      state.storefronts.filter(function (usf) { return (usf.date || '') >= todayISO(); }).map(function (usf) {
        return '<option value="sf:' + usf.id + '">' + esc(usf.name || 'Storefront') + ' · ' + esc(fmtDate(usf.date)) + '</option>';
      }).join('') +
      '<option value="trunk">Storefront trunk stock</option></optgroup>' +
      '</select></label>' +
      '<label class="fld">Containers<input class="weight-in" type="number" step="1" inputmode="numeric" name="containers" placeholder="#"></label>' +
      '<label class="fld">Date<input type="date" name="date"></label>' +
      '<label class="fld">Note<input name="note" placeholder="Optional" style="width:130px"></label>' +
      '<label class="perscout" style="align-self:flex-end;min-height:40px"><input type="checkbox" name="isReturn"> Return (subtract)</label>' +
      '<button class="btn primary" type="submit" style="align-self:flex-end"' + (inv.products.length ? '' : ' disabled') + '>Hand out</button>' +
      '</form>' +
      '<p class="small muted" style="margin:8px 0 0">A return subtracts from what that den/scout holds. You can also type a negative number.</p></div>';

    // On-hand by product
    h += '<div class="card"><h2 class="section display">On hand by product</h2>';
    if (!inv.products.length) {
      h += '<div class="empty">Add products to see what’s on hand.</div>';
    } else {
      h += '<div class="tbl-wrap"><table><thead><tr><th scope="col">Product</th><th scope="col" class="num">Ordered</th><th scope="col" class="num">Handed out</th><th scope="col" class="num">On hand</th></tr></thead><tbody>';
      inv.products.forEach(function (p) {
        var hand = onHand(p);
        h += '<tr><td>' + esc(p.name || '—') + '</td>' +
          '<td class="num">' + containersOrdered(p) + '</td>' +
          '<td class="num">' + distributedContainers(p.id) + '</td>' +
          '<td class="num" style="font-weight:650' + (hand < 0 ? ';color:var(--bad)' : '') + '">' + hand + '</td></tr>';
      });
      h += '</tbody></table></div></div>';
    }

    // Out by den / scout (net held), grouped by den. Wave 19(17): storefront + trunk
    // targets collect into their own "Trunk / storefront stock" group below.
    var byDen = {}, byScout = {}, bySfTarget = {}, sfTargetOrder = [], trunkNet = 0, anyTrunk = false;
    inv.distributions.forEach(function (d) {
      if (d.target.kind === 'den') byDen[d.target.den] = (byDen[d.target.den] || 0) + d.containers;
      else if (d.target.kind === 'scout') byScout[d.target.id] = (byScout[d.target.id] || 0) + d.containers;
      else if (d.target.kind === 'storefront') {
        if (bySfTarget[d.target.id] == null) { bySfTarget[d.target.id] = 0; sfTargetOrder.push(d.target.id); }
        bySfTarget[d.target.id] += d.containers;
      } else { trunkNet += d.containers; anyTrunk = true; }
    });
    var outRows = '';
    DENS.forEach(function (dn) {
      var group = '';
      if (byDen[dn]) group += '<div class="assign-row"><span class="assign-name">' + esc(dn) + ' den <span class="muted">(den-level)</span></span><span class="money">' + byDen[dn] + '</span></div>';
      state.scouts.forEach(function (s) {
        if (s.den === dn && byScout[s.id]) {
          group += '<div class="assign-row"><span class="assign-name">' + esc(s.name) + '</span><span class="money">' + byScout[s.id] + '</span></div>';
        }
      });
      if (group) outRows += '<p class="eyebrow" style="margin:10px 0 2px">' + esc(dn) + '</p>' + group;
    });
    // Scouts whose den isn't a standard den (blank / legacy)
    var otherGroup = '';
    state.scouts.forEach(function (s) {
      if (DENS.indexOf(s.den) === -1 && byScout[s.id]) {
        otherGroup += '<div class="assign-row"><span class="assign-name">' + esc(s.name) + (s.den ? ' <span class="muted">(' + esc(s.den) + ')</span>' : '') + '</span><span class="money">' + byScout[s.id] + '</span></div>';
      }
    });
    if (otherGroup) outRows += '<p class="eyebrow" style="margin:10px 0 2px">Other</p>' + otherGroup;
    // Wave 19(17) — trunk / storefront stock group (net held per target).
    var trunkGroup = '';
    sfTargetOrder.forEach(function (tid) {
      if (!bySfTarget[tid]) return;
      trunkGroup += '<div class="assign-row"><span class="assign-name">' + esc(distTargetName({ kind: 'storefront', id: tid })) + '</span><span class="money">' + bySfTarget[tid] + '</span></div>';
    });
    if (anyTrunk && trunkNet) {
      trunkGroup += '<div class="assign-row"><span class="assign-name">Storefront trunk stock <span class="muted">(generic)</span></span><span class="money">' + trunkNet + '</span></div>';
    }
    if (trunkGroup) outRows += '<p class="eyebrow" style="margin:10px 0 2px">Trunk / storefront stock</p>' + trunkGroup;
    h += '<div class="card"><h2 class="section display">Out by den &amp; scout</h2>';
    h += outRows ? outRows : '<div class="empty">Nothing handed out yet.</div>';
    h += '</div>';

    // Distribution log (reverse chronological)
    h += '<div class="card"><h2 class="section display">Hand-out log</h2>';
    if (!inv.distributions.length) {
      h += '<div class="empty">No hand-outs recorded yet. Use the form above to move popcorn to a den or scout.</div>';
    } else {
      var log = inv.distributions.map(function (d, i) { return { d: d, i: i }; });
      log.sort(function (a, b) {
        var ad = a.d.date || '', bd = b.d.date || '';
        if (ad && bd) return bd.localeCompare(ad) || b.i - a.i;
        if (ad && !bd) return -1;
        if (!ad && bd) return 1;
        return b.i - a.i;
      });
      log.forEach(function (rec) {
        var d = rec.d;
        var p = invProduct(d.productId);
        var isReturn = d.containers < 0;
        var qty = isReturn ? ('−' + Math.abs(d.containers) + ' returned') : ('+' + d.containers);
        h += '<div class="assign-row">' +
          '<span class="assign-name">' + qty + ' · ' + esc(p ? p.name : '—') + ' → ' + esc(distTargetName(d.target)) + '</span>' +
          (d.date ? '<span class="pill navy">' + esc(fmtDate(d.date)) + '</span>' : '') +
          (d.note ? '<span class="small muted">' + esc(d.note) + '</span>' : '') +
          tinyDangerBtn('del-distribution:' + d.id, 'Delete hand-out') +
          '</div>';
      });
    }
    h += '</div>';
    return h;
  }

  /* ----- Wave 5: Pinewood Derby (race-day check-in + results) ----- */
  // Standalone race-day module — car check-in, weigh-in/inspection pass, per-run lane
  // times, and computed standings. NOT a heat/lane scheduler (packs use a track timer
  // for lane assignment); this tracks and announces results. Times are decimal seconds.
  // A racer links to an active scout OR carries a freeform name (siblings/parents/open
  // class) — a freeform name overrides the linked scout's name.
  function carRacer(car) {
    if (car.racerName) return car.racerName;
    var s = car.scoutId ? getScout(car.scoutId) : null;
    if (s) return s.name;
    return car.number != null ? 'Car #' + car.number : 'Unnamed racer';
  }
  function carDen(car) {
    if (car.den) return car.den;
    var s = car.scoutId ? getScout(car.scoutId) : null;
    return (s && s.den) ? s.den : '';
  }
  // Stats over recorded runs only — empty/≤0 slots ignored; guards divide-by-zero.
  function carStats(car) {
    var runs = car.times.filter(function (t) { return typeof t === 'number' && isFinite(t) && t > 0; });
    if (!runs.length) return { count: 0, avg: null, best: null };
    var sum = 0, best = runs[0];
    runs.forEach(function (t) { sum += t; if (t < best) best = t; });
    return { count: runs.length, avg: sum / runs.length, best: best };
  }
  function fmtTime(t) { return (t == null) ? '—' : t.toFixed(3) + 's'; }
  function sortedCars() {
    return state.derby.cars.slice().sort(function (a, b) {
      var an = a.number == null ? Infinity : a.number;
      var bn = b.number == null ? Infinity : b.number;
      return an - bn || carRacer(a).localeCompare(carRacer(b));
    });
  }
  function renderDerby() {
    var d = state.derby;
    var roster = activeScouts();
    // --- Setup ---
    var h = '<div class="card"><h2 class="section display">Pinewood Derby</h2>' +
      '<p class="small muted" style="margin:0 0 10px">Race-day check-in, weigh-in, and results. Enter each run’s time in seconds — ' +
      'the standings rank by average time (fastest first). Official lane assignments usually come from your track timer; ' +
      'this is for tracking and announcing results.</p>' +
      '<div class="row">' +
      '<label class="fld">Event name<input data-ch="derby-name" value="' + esc(d.name) + '" placeholder="Pack 569 Pinewood Derby" style="width:220px"></label>' +
      '<label class="fld">Date (optional)<input type="date" data-ch="derby-date" value="' + esc(d.date) + '"></label>' +
      '<label class="fld">Runs per car<input class="weight-in" type="number" min="1" max="8" step="1" inputmode="numeric" data-ch="derby-lanes" value="' + d.lanes + '"></label>' +
      '</div></div>';

    // --- Check-in / add a car ---
    h += '<div class="card"><h2 class="section display">Check-in</h2>' +
      '<form data-form="add-car" class="row">' +
      '<label class="fld">Car #<input type="number" min="1" step="1" inputmode="numeric" name="number" placeholder="#" style="width:70px"></label>' +
      '<label class="fld">Scout<select name="scout"><option value="">— none / open class —</option>' +
      roster.map(function (s) { return '<option value="' + s.id + '">' + esc(s.name) + '</option>'; }).join('') +
      '</select></label>' +
      '<label class="fld">Racer name<input name="racer" placeholder="Overrides scout" style="width:150px"></label>' +
      '<label class="fld">Den<select name="den"><option value="">— den —</option>' +
      DENS.map(function (dn) { return '<option value="' + dn + '">' + dn + '</option>'; }).join('') +
      '</select></label>' +
      '<button class="btn primary" type="submit" style="align-self:flex-end">Add car</button>' +
      '</form>' +
      '<p class="small muted" style="margin:8px 0 0">Link a scout, or leave it open for siblings, parents, and open-class cars. ' +
      'A racer name overrides the linked scout; den auto-fills from the scout when left blank.</p>';

    if (!d.cars.length) {
      h += '<div class="empty" style="margin:12px 0 0">No cars checked in yet. Add each racer above.</div></div>';
      h += renderDerbyAwards();
      return h;
    }
    sortedCars().forEach(function (car) { h += renderCarCard(car); });
    h += '</div>';

    // Wave 19(18) — design awards (judge's picks)
    h += renderDerbyAwards();

    // --- Results ---
    h += renderDerbyResults();
    return h;
  }

  /* ----- Wave 19(18): derby design awards ----- */
  var DERBY_AWARD_NAMES = ['Most Patriotic', 'Best in Show', 'Most Creative', 'Best Paint', 'Cubmaster’s Choice'];
  function renderDerbyAwards() {
    var d = state.derby;
    var h = '<div class="card"><h2 class="section display">Design awards</h2>' +
      '<p class="small muted" style="margin:0 0 8px">Judge’s picks — separate from the race standings. Archived with the derby results at close-out.</p>';
    d.awards.forEach(function (aw) {
      h += '<div class="assign-row"><span class="assign-name"><strong>' + esc(aw.award || 'Award') + '</strong>' +
        (aw.racerName ? ' — ' + esc(aw.racerName) : '') + '</span>' +
        tinyDangerBtn('del-award:' + aw.id, 'Remove ' + (aw.award || 'award')) + '</div>';
    });
    h += '<form data-form="add-derby-award" class="row" style="margin-top:8px">' +
      '<label class="fld">Award<input name="award" list="derbyAwardList" placeholder="Best in Show" style="width:170px"></label>' +
      '<datalist id="derbyAwardList">' + DERBY_AWARD_NAMES.map(function (n) { return '<option value="' + esc(n) + '">'; }).join('') + '</datalist>' +
      '<label class="fld">Car / racer<select name="car"><option value="">— pick a car —</option>' +
      sortedCars().map(function (car) {
        return '<option value="' + car.id + '">' + esc((car.number != null ? '#' + car.number + ' ' : '') + carRacer(car)) + '</option>';
      }).join('') +
      '</select></label>' +
      '<label class="fld">Or name<input name="racer" placeholder="Overrides the pick" style="width:150px"></label>' +
      '<button class="btn primary small" type="submit" style="align-self:flex-end">Add award</button></form>';
    return h + '</div>';
  }
  function renderCarCard(car) {
    var lanes = state.derby.lanes;
    var st = carStats(car);
    var eff = carDen(car);
    var s = car.scoutId ? getScout(car.scoutId) : null;
    var title = (car.number != null ? '#' + car.number + ' ' : '') + esc(carRacer(car));
    var h = '<div class="block-card">' +
      '<div class="spread"><h3 class="section display" style="margin:0">' + title +
      (eff ? ' <span class="pill navy">' + esc(eff) + '</span>' : '') + '</h3>' +
      tinyDangerBtn('del-car:' + car.id, 'Remove ' + carRacer(car)) + '</div>';

    // Den (editable — open-class racers can be assigned a den) + weigh-in / inspection pass.
    var denEmptyLabel = (s && s.den) ? esc(s.den) + ' (from scout)' : '— den —';
    h += '<div class="row" style="margin:10px 0 6px">' +
      '<label class="fld">Den<select data-ch="derby-den" data-id="' + car.id + '">' +
      '<option value="">' + denEmptyLabel + '</option>' +
      DENS.map(function (dn) { return '<option value="' + dn + '"' + (car.den === dn ? ' selected' : '') + '>' + dn + '</option>'; }).join('') +
      '</select></label>' +
      '<label class="fld" style="flex-direction:row;align-items:center;gap:6px;align-self:flex-end;min-height:40px">' +
      '<input type="checkbox" data-ch="derby-weigh" data-id="' + car.id + '"' + (car.weighedIn ? ' checked' : '') + '>' +
      '<span>Weighed in / passed inspection</span></label>' +
      '</div>';

    h += '<input data-ch="derby-note" data-id="' + car.id + '" value="' + esc(car.inspectNote) +
      '" placeholder="Inspection note (optional)" style="width:100%;margin-bottom:8px">';

    // One time input per run/lane. Values are decimal seconds, commit on blur.
    h += '<div class="row">';
    for (var i = 0; i < lanes; i++) {
      var tv = (typeof car.times[i] === 'number' && car.times[i] > 0) ? car.times[i] : '';
      h += '<label class="fld">Run ' + (i + 1) +
        '<input class="weight-in" type="number" min="0" step="0.001" inputmode="decimal" data-ch="derby-time" data-id="' + car.id +
        '" data-slot="' + i + '" value="' + tv + '"></label>';
    }
    h += '</div>';

    // Reducing the run count keeps earlier times in the data (non-destructive); they still count.
    var extra = 0;
    car.times.forEach(function (t, idx) { if (idx >= lanes && typeof t === 'number' && t > 0) extra++; });
    if (extra > 0) {
      h += '<p class="small muted" style="margin:6px 0 0">+' + extra + ' earlier run' + (extra === 1 ? '' : 's') +
        ' recorded beyond the current run count — still counted in results.</p>';
    }

    h += '<p class="small" style="margin:8px 0 0">' +
      (st.count
        ? 'Average <strong>' + fmtTime(st.avg) + '</strong> · best ' + fmtTime(st.best) + ' · ' + st.count + ' run' + (st.count === 1 ? '' : 's')
        : '<span class="muted">No times recorded yet.</span>') +
      '</p></div>';
    return h;
  }
  function renderDerbyResults() {
    var timed = [], untimed = [];
    state.derby.cars.forEach(function (car) {
      var st = carStats(car);
      var rec = { car: car, racer: carRacer(car), den: carDen(car), num: car.number, avg: st.avg, best: st.best, count: st.count };
      if (st.count) timed.push(rec); else untimed.push(rec);
    });
    var h = '<div class="card"><h2 class="section display">Results</h2>';
    if (!timed.length) {
      h += '<div class="empty">No times recorded yet. Enter run times on the check-in cards above to rank the cars.</div>';
    } else {
      // Fastest average first; ties broken by best single run, then car #, then name (stable).
      timed.sort(function (a, b) {
        return a.avg - b.avg ||
          a.best - b.best ||
          ((a.num == null ? Infinity : a.num) - (b.num == null ? Infinity : b.num)) ||
          a.racer.localeCompare(b.racer);
      });
      var medals = ['🥇', '🥈', '🥉'], ord = ['1st', '2nd', '3rd'];
      h += '<div class="tbl-wrap"><table><thead><tr><th scope="col"></th><th scope="col">Racer</th><th scope="col" class="num">Car</th><th scope="col">Den</th>' +
        '<th scope="col" class="num">Average</th><th scope="col" class="num">Best</th><th scope="col" class="num">Runs</th></tr></thead><tbody>';
      timed.forEach(function (r, i) {
        var rankCell = i < 3
          ? '<span class="pill' + (i === 0 ? '' : ' navy') + '" aria-label="' + ord[i] + ' place">' + medals[i] + ' ' + (i + 1) + '</span>'
          : '<span class="muted">' + (i + 1) + '</span>';
        h += '<tr><td>' + rankCell + '</td>' +
          '<td>' + esc(r.racer) + '</td>' +
          '<td class="num">' + (r.num != null ? '#' + r.num : '—') + '</td>' +
          '<td>' + (r.den ? esc(r.den) : '<span class="muted">—</span>') + '</td>' +
          '<td class="num" style="font-weight:650">' + fmtTime(r.avg) + '</td>' +
          '<td class="num">' + fmtTime(r.best) + '</td>' +
          '<td class="num">' + r.count + '</td></tr>';
      });
      h += '</tbody></table></div>';

      // Den champions — fastest average within each den (packs award these).
      var champs = [];
      DENS.forEach(function (dn) {
        for (var j = 0; j < timed.length; j++) { if (timed[j].den === dn) { champs.push(timed[j]); break; } }
      });
      if (champs.length) {
        h += '<h3 class="section display" style="margin:14px 0 6px">Den champions</h3>' +
          '<div class="tbl-wrap"><table><thead><tr><th scope="col">Den</th><th scope="col">Racer</th><th scope="col" class="num">Car</th><th scope="col" class="num">Average</th></tr></thead><tbody>';
        champs.forEach(function (r) {
          h += '<tr><td><span class="pill navy">' + esc(r.den) + '</span></td>' +
            '<td>' + esc(r.racer) + '</td>' +
            '<td class="num">' + (r.num != null ? '#' + r.num : '—') + '</td>' +
            '<td class="num" style="font-weight:650">' + fmtTime(r.avg) + '</td></tr>';
        });
        h += '</tbody></table></div>';
      }
    }
    // Cars checked in but not yet timed.
    if (untimed.length) {
      untimed.sort(function (a, b) {
        return ((a.num == null ? Infinity : a.num) - (b.num == null ? Infinity : b.num)) || a.racer.localeCompare(b.racer);
      });
      h += '<h3 class="section display" style="margin:14px 0 6px">Not yet timed</h3>' +
        '<div class="tbl-wrap"><table><thead><tr><th scope="col">Racer</th><th scope="col" class="num">Car</th><th scope="col">Den</th><th scope="col">Inspection</th></tr></thead><tbody>';
      untimed.forEach(function (r) {
        h += '<tr><td>' + esc(r.racer) + '</td>' +
          '<td class="num">' + (r.num != null ? '#' + r.num : '—') + '</td>' +
          '<td>' + (r.den ? esc(r.den) : '<span class="muted">—</span>') + '</td>' +
          '<td>' + (r.car.weighedIn ? '<span style="color:var(--good);font-weight:650">✓ passed</span>' : '<span class="muted">pending</span>') + '</td></tr>';
      });
      h += '</tbody></table></div>';
    }
    return h + '</div>';
  }

  // Wave 6 — plain-text month digest for pasting into a parent email / newsletter.
  // READ-ONLY: composes text from existing state; recomputes for whatever month is shown.
  function monthlyDigest(mk) {
    var lines = [];
    var pack = state.packName || 'Pack';
    lines.push(pack + ' — ' + monthLabel(mk));
    lines.push('');

    // Headcount note shared by any RSVP-bearing event (reuses rsvpSummary).
    function goingNote(evKey) {
      var sum = rsvpSummary(evKey);
      if (!sum.any || sum.yes < 1) return '';
      return ' — ' + sum.yes + ' scout' + (sum.yes === 1 ? '' : 's') + ' signed up' +
        (sum.adults ? ' (+' + sum.adults + ' adult' + (sum.adults === 1 ? '' : 's') + ')' : '');
    }

    // 1. Dated events, chronological (reuses dayEventsForMonth).
    var byDay = dayEventsForMonth(mk);
    var evLines = [];
    Object.keys(byDay).map(Number).sort(function (a, b) { return a - b; }).forEach(function (day) {
      var when = fmtDate(mk + '-' + pad2(day));
      byDay[day].forEach(function (e) {
        if (e.type === 'storefront') {
          evLines.push('- ' + when + ': Storefront at ' + (e.sf.name || 'TBD') + goingNote('sf:' + e.sf.id));
        } else if (e.type === 'meeting') {
          var label = e.m.kind === 'pack' ? 'Pack meeting' : ('Den meeting' + (e.m.den ? ' (' + e.m.den + ')' : ''));
          var mtgTime = fmtClock(e.m.time);
          var extra = (mtgTime ? ' at ' + mtgTime : '') + (e.m.note ? ' — ' + e.m.note : '');
          evLines.push('- ' + when + ': ' + label + extra + goingNote('mtg:' + e.m.id));
        } else if (e.type === 'activity') {
          evLines.push('- ' + when + ': ' + (e.a.name || 'Activity') + goingNote('act:' + e.a.id));
        }
      });
    });
    if (evLines.length) {
      lines.push('EVENTS THIS MONTH');
      evLines.forEach(function (l) { lines.push(l); });
      lines.push('');
    }

    // 2. Undated activities planned for this month (same filter the tab uses).
    var undated = state.budget.activities.filter(function (a) { return !a.date && slotMonthKey(a.slot) === mk; });
    if (undated.length) {
      lines.push('ALSO PLANNED THIS MONTH (date TBD)');
      undated.forEach(function (a) { lines.push('- ' + (a.name || 'Activity')); });
      lines.push('');
    }

    // Clean empty state when nothing at all is on the calendar this month.
    if (!evLines.length && !undated.length) {
      lines.push('Nothing scheduled for this month yet — check back soon.');
      lines.push('');
    }

    // 3. Popcorn — only when there's sale data or a goal set (reuses computePackTotals).
    var packT = computePackTotals();
    if (state.storefronts.length || state.entries.length || packT.teGoal > 0) {
      lines.push('POPCORN');
      lines.push('Sales + donations so far: ' + fmt(packT.combined));
      if (packT.teGoal > 0) {
        lines.push('Trail\'s End goal: ' + fmt(packT.teEligible) + ' of ' + fmt(packT.teGoal) +
          ' (' + Math.min(100, Math.round(packT.teEligible / packT.teGoal * 100)) + '%)');
      }
      lines.push('');
    }

    // 4. Other (non-popcorn) fundraisers (reuses fundraiserTotals).
    if (state.fundraisers.length) {
      lines.push('OTHER FUNDRAISERS');
      state.fundraisers.forEach(function (fr) {
        var ft = fundraiserTotals(fr);
        lines.push('- ' + (fr.name || 'Fundraiser') + ': ' + fmt(ft.total) + ' raised' +
          (fr.goalCents > 0 ? ' of ' + fmt(fr.goalCents) + ' goal' : ''));
      });
      lines.push('');
    }

    // 5. Leader training needing attention (reuses the Pack tab's leaderStatus expiry logic).
    var needs = [];
    state.leaders.forEach(function (l) {
      var pills = leaderStatus(l);
      if (pills.length) {
        needs.push('- ' + (l.name || 'A leader') + (l.role ? ' (' + l.role + ')' : '') + ': ' +
          pills.map(function (p) { return p.label; }).join(', '));
      }
    });
    // Wave 19(4) — scout registration renewals due this month or overdue.
    var curMonth = monthKey(todayISO());
    var scoutRenewals = [];
    activeScouts().forEach(function (s) {
      if (!renewalDue(s.renewalMonth)) return;
      scoutRenewals.push('- ' + s.name + ': registration renewal ' +
        (s.renewalMonth < curMonth ? 'overdue (since ' + monthLabel(s.renewalMonth) + ')' : 'due this month'));
    });
    if (needs.length || scoutRenewals.length) {
      lines.push('ACTION NEEDED');
      needs.forEach(function (l) { lines.push(l); });
      scoutRenewals.forEach(function (l) { lines.push(l); });
      lines.push('');
    }

    lines.push('Thanks for being part of ' + pack + '!');
    return lines.join('\n');
  }

  function buildCsv() {

    var commLabel = 'PACK COMMISSION (' + pack.pct + '% of Sales + Online' + (pack.viaTE ? ' + Cash' : '') + ')';
    if (pack.commission != null) lines.push([commLabel, '', '', '', '', '', '', '', '', '', '', (pack.commission / 100).toFixed(2)].join(','));
    if (pack.teGoal > 0) lines.push(["TRAIL'S END GOAL", '', '', '', '', '', '', '', '', '', '', (pack.teGoal / 100).toFixed(2)].join(','));
    if (pack.cashGoal > 0) lines.push(['CASH DONATIONS GOAL', '', '', '', '', '', '', '', '', '', '', (pack.cashGoal / 100).toFixed(2)].join(','));
    // Wave 4: other fundraisers — a small standalone section (Fundraiser, Scout, Amount).
    if (state.fundraisers.length) {
      lines.push('');
      lines.push('OTHER FUNDRAISERS');
      lines.push(['Fundraiser', 'Scout', 'Amount'].join(','));
      state.fundraisers.forEach(function (fr) {
        var per = {}, frTotal = 0;
        fr.sales.forEach(function (sale) { per[sale.scoutId] = (per[sale.scoutId] || 0) + sale.cents; frTotal += sale.cents; });
        state.scouts.forEach(function (s) {

  function download(name, mime, text) {
    try {
      var blob = new Blob([text], { type: mime });
      var url = URL.createObjectURL(blob);
      var a = document.createElement('a');
      a.href = url; a.download = name;
      document.body.appendChild(a); a.click(); a.remove();
      setTimeout(function () { URL.revokeObjectURL(url); }, 2000);
    } catch (e) { /* copy fallback remains available */ }
  }
  function copyText(text, done) {
    function fallback() {
      var ta = document.getElementById('exportBox');
      var tmp = null;
      if (!ta) {
        tmp = document.createElement('textarea');
        tmp.value = text; document.body.appendChild(tmp); ta = tmp;
      }
      ta.select(); ta.setSelectionRange(0, ta.value.length);
      try { document.execCommand('copy'); done(true); } catch (e) { done(false); }
      if (tmp) tmp.remove();
    }
    if (navigator.clipboard && navigator.clipboard.writeText) {
      navigator.clipboard.writeText(text).then(function () { done(true); }, fallback);
    } else fallback();
  }
  function handleImportFile(input) {
    var file = input.files && input.files[0];
    input.value = '';
    if (!file) return;
    var reader = new FileReader();
    reader.onload = function () {
      var data = null;
      try { data = JSON.parse(String(reader.result)); } catch (e) { /* not JSON */ }
      data = normalizeState(data);
      if (!data) { showToast('That file isn’t a ledger backup.'); return; }
      ui.overlay = { kind: 'import', data: data };
      render();
    };
    reader.readAsText(file);
  }

  /* ---------------- Calendar (.ics) interchange (Wave 10) ---------------- */
  // BAND (band.us) has no live sync API, but it imports/exports .ics calendar files.
  // The same file works with Google/Apple/Outlook. Everything here is additive — it
  // touches no money math and never mutates state on export.
  // Escape a text VALUE per RFC 5545 (SUMMARY/DESCRIPTION/LOCATION). Params are NOT escaped.
  function icsEscape(v) {
    return String(v == null ? '' : v)
      .replace(/\\/g, '\\\\')
      .replace(/;/g, '\\;')
      .replace(/,/g, '\\,')
      .replace(/\r?\n/g, '\\n');
  }
  // RFC 5545 line folding: split any line over 74 chars, continuation lines start with a space.
  function icsFold(line) {
    if (line.length <= 74) return line;
    var out = line.slice(0, 74), rest = line.slice(74);
    while (rest.length > 73) { out += '\r\n ' + rest.slice(0, 73); rest = rest.slice(73); }
    return out + '\r\n ' + rest;
  }
  function icsDate(iso) { return String(iso || '').replace(/-/g, ''); }   // 2026-09-12 → 20260912
  function icsTime(hhmm) { return String(hhmm || '').replace(':', ''); }  // 19:00 → 1900
  function icsNextDay(iso) {                                              // end-exclusive all-day DTEND
    var p = String(iso || '').split('-');
    var d = new Date(+p[0], +p[1] - 1, +p[2] + 1);
    return d.getFullYear() + pad2(d.getMonth() + 1) + pad2(d.getDate());
  }

      if (sid != null) matched.push({ scoutId: sid, name: s.name, onlineCents: s.onlineCents, wagonCents: s.wagonCents });
      else unmatched.push(s.name);
    });
    return { matched: matched, unmatched: unmatched };
  }
  // Add any seller from a Trail's End report who isn't already on the roster. Shared by the
  // live-season import and the past-season archive (carrying last year's scouts forward).
  // Case-insensitive, so an existing scout is never duplicated; existing rows are never
  // touched. New scouts arrive with no den — the owner sets dens and archives anyone no
  // longer active from the Scouts tab. Returns how many were added.
  function teAddMissingScouts(arcScouts) {
    var have = {};
    state.scouts.forEach(function (s) { have[String(s.name || '').trim().toLowerCase()] = true; });
    var added = 0;
    arcScouts.forEach(function (s) {
      var k = String(s.name || '').trim().toLowerCase();
      if (!k || have[k]) return;
      state.scouts.push({ id: uid(), name: String(s.name).trim(), den: '', archived: false, renewalMonth: '', denLabel: '', note: '' });
      have[k] = true;
      added += 1;
    });
    if (added) state.scouts.sort(function (a, b) { return a.name.localeCompare(b.name); });
    return added;
  }
  function teBuildSalesPreview(arc) {
    var m = teMatchScouts(arc.scouts);
    // Same-kind replacement only — a Wave 7 'season' close-out for the same year coexists.
    var existsYear = state.archives.some(function (a) { return a.kind === 'trails-end' && a.year === arc.year; });
    // Wave 16 — the program year (Sept start) spans two calendar years, so a report whose
    // transactions land in either calendar year belongs to the current season.
    var py = state.budget.programYear;
    var isCurrentSeason = arc.year === py || arc.year === py + 1;
    return { kind: 'te-preview', report: 'sales', archive: arc, matched: m.matched.length, unmatched: m.unmatched,
      // Default ON: Trail's End is the roster of record during the sale, so a name it knows
      // and we don't is almost always a real scout. They're created with no den; the owner
      // then sets dens and archives anyone no longer active from the Scouts tab.
      // addRoster does the same for the PAST-season path: saving an archive also carries
      // last year's sellers onto this year's roster (names only — the money stays in the
      // archive and never touches the current season).
      existsYear: existsYear, isCurrentSeason: isCurrentSeason, createMissing: true, addRoster: true };
  }
  // Wave 16 — what the live import WILL write, honoring the create-missing toggle.
  // Online + wagon only; storefront credit deliberately never imports (it lives in the
  // app's storefront blocks — importing it would double-count).
  function teLivePreviewTotals(o) {
    var m = teMatchScouts(o.archive.scouts);
    var rows = m.matched.slice();
    if (o.createMissing) {
      o.archive.scouts.forEach(function (s) {
        if (m.unmatched.indexOf(s.name) !== -1) rows.push({ scoutId: null, name: s.name, onlineCents: s.onlineCents, wagonCents: s.wagonCents });
      });
    }
    var onlineCents = 0, wagonCents = 0, scoutN = 0;
    rows.forEach(function (r) {
      onlineCents += r.onlineCents; wagonCents += r.wagonCents;
      if (r.onlineCents > 0 || r.wagonCents > 0) scoutN += 1;
    });
    return { onlineCents: onlineCents, wagonCents: wagonCents, scouts: scoutN, matched: m.matched.length, unmatched: m.unmatched };
  }
  // Wave 16 — commit the live-season import: the report is a full-season snapshot, so
  // every previously imported entry (source 'te-import') is removed globally, then fresh
  // online/wagon entries are written per matched scout. Manual entries (no source) are
  // never touched, so a re-import replaces prior imported figures exactly.
  function teCommitSalesLive() {
    var o = ui.overlay;
    if (!o || o.report !== 'sales' || !o.archive) return;
    var arc = o.archive;
    if (o.createMissing) teAddMissingScouts(arc.scouts);
    var m = teMatchScouts(arc.scouts); // re-match AFTER any creation, against live state
    state.entries = state.entries.filter(function (e) { return e.source !== 'te-import'; });
    var today = todayISO(), updated = 0;
    m.matched.forEach(function (row) {
      if (row.onlineCents > 0) {
        state.entries.push({ id: uid(), scoutId: row.scoutId, kind: 'online', date: today, salesCents: row.onlineCents, donationsCents: 0, source: 'te-import' });
      }
      if (row.wagonCents > 0) {
        state.entries.push({ id: uid(), scoutId: row.scoutId, kind: 'wagon', date: today, salesCents: row.wagonCents, donationsCents: 0, source: 'te-import' });
      }
      if (row.onlineCents > 0 || row.wagonCents > 0) updated += 1;
    });
    ui.overlay = null;
    commit();
    showToast('Updated online/wagon sales for ' + updated + ' scout' + (updated === 1 ? '' : 's') + ' from Trail’s End');
  }
  function teCommitShiftImport() {
    var o = ui.overlay;
    if (!o || o.report !== 'shifts') return;
    var existing = {};
    state.storefronts.forEach(function (sf) { existing[teStorefrontKey(sf.name, sf.date)] = true; });
    var added = 0;
    o.items.forEach(function (it) {
      var key = teStorefrontKey(it.name, it.date);
      if (existing[key]) return; // already added — never edit/overwrite an existing storefront
      state.storefronts.push({
        id: uid(), name: it.name, date: it.date,
        blocks: it.shifts.map(function (s, i) {
          return { id: uid(), label: 'Block ' + (i + 1), start: parseLegacyTime(s.start), end: parseLegacyTime(s.end), assignments: [], adults: [], salesCents: 0, donationsCents: 0, cardCents: 0 };
        })
      });
      existing[key] = true;
      added += 1;
    });
    sortStorefronts();
    ui.overlay = null;
    commit();
    showToast(added ? ('Added ' + added + ' storefront' + (added === 1 ? '' : 's')) : 'Nothing new to add');
  }
  function teCommitSalesArchive() {
    var o = ui.overlay;
    if (!o || o.report !== 'sales' || !o.archive) return;
    var arc = o.archive;
    var record = {
      id: uid(), kind: 'trails-end', year: arc.year, importedAt: new Date().toISOString(), grandCents: arc.grandCents,
      channel: { onlineCents: arc.channel.onlineCents, wagonCents: arc.channel.wagonCents, storefrontCents: arc.channel.storefrontCents },
      scouts: arc.scouts.map(function (s) { return { name: s.name, code: s.code, onlineCents: s.onlineCents, wagonCents: s.wagonCents, storefrontCents: s.storefrontCents, totalCents: s.totalCents }; }),
      locations: arc.locations.map(function (l) { return { name: l.name, tx: l.tx, cents: l.cents }; })
    };
    var replaced = false;
    // Replace only the same-kind entry — never a Wave 7 'season' close-out of the same year.
    state.archives = state.archives.map(function (a) { if (a.kind === 'trails-end' && a.year === record.year) { replaced = true; return record; } return a; });
    if (!replaced) state.archives.push(record);
    // Carry last year's sellers onto the roster (names only — no sales are imported; the
    // figures live in the archive record above).
    var addedScouts = o.addRoster ? teAddMissingScouts(arc.scouts) : 0;
    ui.overlay = null;
    commit();
    showToast((replaced ? 'Replaced ' : 'Saved ') + record.year + ' season in Past seasons' +
      (addedScouts ? ' · added ' + addedScouts + ' scout' + (addedScouts === 1 ? '' : 's') + ' to the roster' : ''));
  }
  function handleTeFile(input) {
    var file = input.files && input.files[0];
    input.value = '';
    if (!file) return;
    showToast('Reading…');
    var reader = new FileReader();
    reader.onerror = function () { showToast('Couldn’t read that file — is it the .xlsx or .csv exported from Trail’s End?'); };
    reader.onload = function () {
      try {
        parseSpreadsheet(reader.result, file.name).then(function (parsed) {
          var det = detectReport(parsed.rows);
          if (!det) { ui.overlay = { kind: 'te-preview', report: 'unknown' }; render(); return; }
          if (det.type === 'shifts') ui.overlay = teBuildShiftPreview(mapShiftReport(parsed.rows, det));
          else ui.overlay = teBuildSalesPreview(mapSalesReport(parsed.rows, det));
          render();
        }).catch(function (err) {
          if (err && err.teNoInflate) showToast('Your browser can’t open .xlsx here — in Trail’s End choose CSV when exporting, then import that.');
          else showToast('Couldn’t read that file — is it the .xlsx or .csv exported from Trail’s End?');
        });
      } catch (e) {
        showToast('Couldn’t read that file — is it the .xlsx or .csv exported from Trail’s End?');
      }
    };
    reader.readAsArrayBuffer(file);
  }
  // Plain-text rendering of an archive for the Copy button (dispatches by kind).
  function archiveText(a) {
    if (a.kind === 'season') return seasonArchiveText(a);
    var lines = [];
    lines.push((state.packName || 'Pack') + ' — ' + a.year + ' popcorn season (Trail’s End)');
    lines.push('Imported ' + fmtArchiveDate(a.importedAt));
    lines.push('Grand total: ' + fmt(a.grandCents));
    lines.push('Online ' + fmt(a.channel.onlineCents) + ' · Wagon ' + fmt(a.channel.wagonCents) + ' · Storefront ' + fmt(a.channel.storefrontCents));
    lines.push('');
    lines.push('Scouts:');
    a.scouts.forEach(function (s) {
      lines.push('  ' + s.name + ' — ' + fmt(s.totalCents) + '  (online ' + fmt(s.onlineCents) + ', wagon ' + fmt(s.wagonCents) + ', storefront ' + fmt(s.storefrontCents) + ')');
    });
    lines.push('');
    lines.push('Locations:');
    a.locations.forEach(function (l) { lines.push('  ' + l.name + ' — ' + fmt(l.cents) + '  (' + l.tx + ' trip' + (l.tx === 1 ? '' : 's') + ')'); });
    return lines.join('\n');
  }
  function fmtArchiveDate(iso) {
    var d = new Date(iso);
    return isNaN(d.getTime()) ? '' : d.toLocaleDateString('en-US', { year: 'numeric', month: 'long', day: 'numeric' });
  }

  /* ---------------- Wave 7: year-end close-out + rollover ---------------- */
  // "Close out the program year": archive a rich season summary (kind:'season'),
  // download a full JSON snapshot of the untouched state, then roll the working
  // ledger into next year so planning starts from this year's real numbers.

  // Top-3 finishers from the derby standings (same sort as renderDerbyResults),
  // or null when no car has a recorded time.
  function derbyWinners() {
    var timed = [];
    state.derby.cars.forEach(function (car) {
      var st = carStats(car);
      if (st.count) timed.push({ racer: carRacer(car), num: car.number, avg: st.avg, best: st.best });
    });
    if (!timed.length) return null;
    timed.sort(function (a, b) {
      return a.avg - b.avg || a.best - b.best ||
        ((a.num == null ? Infinity : a.num) - (b.num == null ? Infinity : b.num)) ||
        a.racer.localeCompare(b.racer);
    });
    return timed.slice(0, 3).map(function (r, i) {
      var w = { place: i + 1, scoutName: r.racer };
      if (r.num != null) w.carName = 'Car #' + r.num;
      return w;
    });
  }

  // Snapshot the whole season into one kind:'season' archive record. Pure read —
  // never mutates state — so it doubles as the close-out preview's data source.
  function buildSeasonArchive() {
    var pack = computePackTotals();
    var bud = computeBudget();
    var totals = computeScoutTotals();
    var year = state.budget.programYear;
    // Active + credited-archived scouts (same roster rule as the Totals boards), desc by combined.
    var scoutRows = rankBy(visibleScoutRows(totals), function (r) { return r.t.combined; }).map(function (r) {
      return { name: r.name, den: r.den || '', salesCents: r.t.sales, donCents: r.t.don, combinedCents: r.t.combined };
    });
    var locs = locationComparison().map(function (l) {
      return { name: l.name, events: l.events, salesCents: l.sales, donCents: l.don };
    });
    var denMeetings = 0, packMeetings = 0;
    state.meetings.forEach(function (m) { if (m.kind === 'pack') packMeetings += 1; else denMeetings += 1; });
    // Average attendance across meetings that have ANY marks: marked ÷ active roster at close time.
    var rosterN = activeScouts().length;
    var attSum = 0, attN = 0;
    state.meetings.forEach(function (m) {
      var marked = state.attendance[m.id];
      var n = marked ? Object.keys(marked).length : 0;
      if (n > 0 && rosterN > 0) { attSum += Math.min(100, Math.round(n / rosterN * 100)); attN += 1; }
    });
    var fees = feesTotals();
    var perDen = [];
    DENS.forEach(function (den) {
      var roster = activeScouts().filter(function (s) { return s.den === den; });
      if (!roster.length) return;
      var complete = roster.filter(scoutAdvComplete).length;
      var awarded = 0;
      roster.forEach(function (s) {
        var a = advRec(s.id);
        if (!a) return;
        ['req', 'elect'].forEach(function (kk) {
          Object.keys(a[kk] || {}).forEach(function (nm) { if (a[kk][nm] === 'awarded') awarded += 1; });
        });
      });
      perDen.push({ den: den, scouts: roster.length, complete: complete, adventuresAwarded: awarded });
    });
    var winners = derbyWinners();
    var invT = inventoryTotals();
    var distributed = 0;
    state.inventory.distributions.forEach(function (dd) { distributed += dd.containers; });
    var hasInv = state.inventory.products.length > 0 || state.inventory.orderTotalCents > 0;
    return {
      id: uid(), kind: 'season', year: year, closedAt: new Date().toISOString(), packName: state.packName || '',
      fundraising: {
        salesCents: pack.sales, donationsCents: pack.don, combinedCents: pack.combined,
        commissionCents: pack.commission, teGoalCents: state.goalCents || 0, cashGoalCents: state.cashGoalCents || 0,
        scouts: scoutRows, locations: locs
      },
      budget: {
        plannedCents: bud.planned, actualCents: bud.actual, startingBalanceCents: bud.startingBalance,
        fundsInCents: bud.fundsIn, balanceCents: bud.balance,
        activities: state.budget.activities.map(function (x) {
          return { name: x.name || '', slot: x.slot || 0, estCents: x.estCents || 0, actualCents: x.actualCents || 0 };
        }),
        expenses: state.budget.expenses.map(function (x) {
          return { name: x.name || '', estCents: x.estCents || 0, actualCents: x.actualCents || 0, perScout: !!x.perScout };
        })
      },
      events: {
        storefronts: state.storefronts.length, denMeetings: denMeetings, packMeetings: packMeetings,
        datedActivities: state.budget.activities.filter(function (x) { return !!x.date; }).length,
        attendanceAvgPct: attN ? Math.round(attSum / attN) : null
      },
      dues: { collectedCents: fees.collected, outstandingCents: fees.outstanding },
      advancement: { perDen: perDen },
      // Wave 19(18) — design awards archive alongside the race winners; either alone
      // is enough to keep the derby section.
      derby: (function () {
        var derbyAwards = state.derby.awards.map(function (aw) { return { award: aw.award, racerName: aw.racerName }; });
        if (!winners && !derbyAwards.length) return null;
        return { name: state.derby.name || '', date: state.derby.date || '', winners: winners || [], awards: derbyAwards };
      })(),
      otherFundraisers: state.fundraisers.map(function (fr) { return { name: fr.name || '', totalCents: fundraiserTotals(fr).total }; }),
      inventory: hasInv ? {
        orderTotalCents: invT.orderTotalCents, earningsCents: invT.earningsCents,
        containersOrdered: invT.totalContainers, containersDistributed: distributed
      } : null,
      leaders: state.leaders.map(function (l) { return { name: l.name || '', role: l.role || '' }; })
    };
  }

  // Wave 19(3) — den advancement, extracted from rolloverYear so the Pack tab's
  // standalone "Advance dens" button and the close-out share ONE loop. Every active
  // scout with a recognized den moves up a rank; Arrow of Light scouts are archived
  // as crossed over (name kept for history). Does NOT commit — callers do.
  function advanceDens() {
    var advanced = 0, crossed = 0;
    state.scouts.forEach(function (s) {
      if (s.archived || !s.den) return;
      var ix = DENS.indexOf(s.den);
      if (ix === -1) return;
      if (s.den === 'Arrow of Light') { s.archived = true; crossed += 1; }
      else { s.den = DENS[ix + 1]; advanced += 1; }
    });
    return { advanced: advanced, crossed: crossed };
  }

  // Roll the working state into next year. KEPT: packName, leaders, archives,
  // reward-tier config, commission rate + cash routing, product catalog, sync/rev.
  function rolloverYear() {
    var bud = computeBudget(); // BEFORE any mutation — the true ending balance carries over (even a shortfall)
    var b = state.budget;
    var closingYear = b.programYear; // Wave 19(3) — compared against densAdvancedYear below
    b.programYear += 1;
    b.startingBalance = bud.balance;
    // Re-seed the plan: same names + months, dates cleared, this year's actuals become next year's estimates.
    b.activities = b.activities.map(function (x) {
      return { id: uid(), slot: x.slot || 0, name: x.name || '', date: '',
        perScout: !!x.perScout, familyPays: !!x.familyPays, // Wave 17 — camp-fee shape carries over
        estCents: (x.actualCents > 0 ? x.actualCents : (x.estCents || 0)), actualCents: 0 };
    });
    b.expenses = b.expenses.map(function (x) {
      return { id: uid(), name: x.name || '', perScout: !!x.perScout, familyPays: !!x.familyPays,
        estCents: (x.actualCents > 0 ? x.actualCents : (x.estCents || 0)), actualCents: 0 };
    });
    state.goalCents = 0;      // re-derived from the new plan
    state.cashGoalCents = 0;  // (commissionPct + cashThroughTrailsEnd are KEPT)
    // Everyone moves up a den; Arrow of Light scouts crossed over — archived, name kept
    // for history. Wave 19(3): SKIPPED when the Pack tab's "Advance dens" button already
    // advanced this roster for the closing year (densAdvancedYear === closingYear).
    if (state.densAdvancedYear !== closingYear) advanceDens();
    state.densAdvancedYear = 0; // fresh year — the advanced roster hasn't been advanced AGAIN
    state.storefronts = [];
    state.entries = [];
    state.meetings = [];
    state.rsvps = {};
    state.attendance = {};
    state.collected = {};
    state.advancement = {};  // new rank = new adventures
    state.derby = { name: '', date: '', lanes: state.derby.lanes || 4, cars: [], awards: [] }; // Wave 19(18) — awards reset too
    state.fundraisers.forEach(function (fr) { fr.sales = []; });
    state.inventory.products.forEach(function (p) { p.cases = 0; }); // catalog kept, order cleared
    state.inventory.distributions = [];
    state.inventory.orderTotalCents = 0; // inventory.commissionPct KEPT
    // Reset transient UI that pointed at cleared records.
    ui.storefrontId = null;
    ui.expandedScouts = {};
    ui.rsvpOpen = {};
    ui.attOpen = {};
    ui.collectOpen = {};
    ui.advOpen = {};
    ui.archiveOpen = {};
    ui.calSelectedDate = null;
  }

  function performCloseout() {
    var year = state.budget.programYear;
    // 1. Snapshot download FIRST — the complete state exactly as it stands, before ANY mutation.
    download('pack-year-' + year + '-snapshot.json', 'application/json', JSON.stringify(state, null, 2));
    // 2. Build + insert the season archive (replaces an earlier close-out of the SAME year;
    //    a Trail's End import of the same year is a different kind and coexists).
    var record = buildSeasonArchive();
    var replaced = false;
    state.archives = state.archives.map(function (a) {
      if (a.kind === 'season' && a.year === record.year) { replaced = true; return record; }
      return a;
    });
    if (!replaced) state.archives.push(record);
    // 3. Roll the working state into next year.
    rolloverYear();
    ui.overlay = null;
    commit();
    showToast('Welcome to the ' + (year + 1) + ' program year');
  }

  /* ----- Wave 7: season-archive rendering (browse rows, sheet, copy text) ----- */
  // Slot label pinned to the ARCHIVE's year, not the live budget's.
  function seasonSlotLabel(a, slot) { return PROGRAM_MONTHS[slot] + ' ' + (slot <= 3 ? a.year : a.year + 1); }
  function seasonEventsLine(a) {
    var e = a.events;
    var parts = [
      e.storefronts + ' storefront' + (e.storefronts === 1 ? '' : 's'),
      e.denMeetings + ' den + ' + e.packMeetings + ' pack meeting' + ((e.denMeetings + e.packMeetings) === 1 ? '' : 's'),
      e.datedActivities + ' dated activit' + (e.datedActivities === 1 ? 'y' : 'ies')
    ];
    if (e.attendanceAvgPct != null) parts.push('avg attendance ' + e.attendanceAvgPct + '%');
    return parts.join(' · ');
  }
  function seasonAdvLine(a) {
    if (!a.advancement.perDen.length) return '';
    return a.advancement.perDen.map(function (d) {
      return d.den + ' ' + d.complete + '/' + d.scouts + ' complete (' + d.adventuresAwarded + ' awarded)';
    }).join(' · ');
  }
  function seasonDerbyLine(a) {
    if (!a.derby) return '';
    var ord = ['1st', '2nd', '3rd'];
    var parts = (a.derby.winners || []).map(function (w) {
      return (ord[w.place - 1] || (w.place + 'th')) + ' ' + w.scoutName + (w.carName ? ' (' + w.carName + ')' : '');
    });
    // Wave 19(18) — design awards ride along after the race places.
    (a.derby.awards || []).forEach(function (w) {
      parts.push(w.award + (w.racerName ? ' — ' + w.racerName : ''));
    });
    return parts.join(' · ');
  }
  // Full read-only expansion — stat row, standings, locations, budget plan-vs-actual,
  // then the one-line sections. Shared by the Past Seasons row and the printable sheet.
  function seasonArchiveTables(a) {
    var f = a.fundraising, b = a.budget;
    var h = '<div class="row" style="margin-bottom:12px">' +
      '<div class="stat"><span class="v money">' + fmt(f.combinedCents) + '</span><span class="l">Raised</span></div>' +

      '</div>';
    if (f.scouts.length) {
      h += '<p class="eyebrow">Scout standings</p><div class="tbl-wrap"><table><caption class="visually-hidden">' + a.year + ' program year — scout standings</caption>' +
        '<thead><tr><th scope="col"></th><th scope="col">Scout</th><th scope="col">Den</th><th scope="col" class="num">Sales</th><th scope="col" class="num">Donations</th><th scope="col" class="num">Combined</th></tr></thead><tbody>';
      f.scouts.forEach(function (s, i) {
        h += '<tr><td class="num muted">' + (i + 1) + '</td><td>' + esc(s.name || '—') + '</td>' +
          '<td>' + (s.den ? esc(s.den) : '<span class="muted">—</span>') + '</td>' +
          '<td class="num">' + fmt(s.salesCents) + '</td><td class="num">' + fmt(s.donCents) + '</td>' +
          '<td class="num" style="font-weight:650">' + fmt(s.combinedCents) + '</td></tr>';
      });
      h += '</tbody></table></div>';
    }
    if (f.locations.length) {
      h += '<p class="eyebrow" style="margin-top:14px">Locations</p><div class="tbl-wrap"><table><caption class="visually-hidden">' + a.year + ' program year — locations</caption>' +
        '<thead><tr><th scope="col">Location</th><th scope="col" class="num">Events</th><th scope="col" class="num">Sales</th><th scope="col" class="num">Donations</th></tr></thead><tbody>';
      f.locations.forEach(function (l) {

  /* ---------------- Event wiring ---------------- */
  // Wave 18(36) — two document-level click listeners, ON PURPOSE:
  //  • The CAPTURE listener (third arg true, below) handles every <button data-act>.
  //    It calls stopPropagation() during the capture phase at `document`, which
  //    prevents the event from ever descending into the page — so no element-level
  //    handlers run, and the BUBBLE listener never fires for button clicks (the
  //    event never travels back up). That is what stops a danger button nested
  //    inside a clickable row (.list-row / .cal-cell) from ALSO toggling the row.
  //  • The BUBBLE listener (third arg false) handles the remaining non-button
  //    [data-act] elements — the clickable <div> rows and calendar cells — after
  //    normal propagation, ignoring clicks that land on inputs/selects/forms
  //    inside those rows.
  // Keyboard activation of the div rows goes through the keydown handler below.
  document.addEventListener('click', function (e) {
    var el = e.target.closest('[data-act]');
    if (!el) return;
    // Don't treat clicks on inputs inside clickable rows as row toggles
    if (e.target.closest('input, select, form') && (el.dataset.act === 'toggle-scout' || el.dataset.act === 'open-storefront')) return;
    var inner = e.target.closest('[data-act]');
    if (inner !== el) return; // handled by inner element's own listener pass
    pendingTap = null;               // Wave 18(8) — a real click arrived
    lastActSig = focusSignature(el); // Wave 18(7) — remember the overlay opener
    handleAction(el.dataset.act, el);
  }, false);

  // Nested data-act elements (danger buttons inside clickable rows): stop row from also firing
  document.addEventListener('click', function (e) {
    var btn = e.target.closest('button[data-act]');
    if (btn) {
      e.stopPropagation();
      pendingTap = null;               // Wave 18(8)
      lastActSig = focusSignature(btn); // Wave 18(7)
      handleAction(btn.dataset.act, btn);
    }
  }, true);

  // Wave 18(8) — blur-commit tap swallow. Editing a text field then tapping a button
  // fires blur → change → commit() → re-render, which destroys the tapped node before
  // the browser can deliver the click (a click needs its mousedown target still in the
  // tree, so it's silently dropped). Approach chosen: remember the pointerdown
  // target's focus-signature; just after pointerup, if no click handled it AND the
  // original node is no longer connected (a re-render swallowed it), find the
  // re-rendered equivalent by signature and run the action once. A delivered click
  // always clears pendingTap first, so nothing can double-fire; moving >24px between
  // down and up cancels (that was a scroll/abort, not a tap).
  var pendingTap = null;
  document.addEventListener('pointerdown', function (e) {
    var el = e.target && e.target.closest ? e.target.closest('[data-act]') : null;
    pendingTap = el ? { sig: focusSignature(el), el: el, x: e.clientX, y: e.clientY } : null;
  }, true);
  document.addEventListener('pointerup', function (e) {
    if (!pendingTap) return;
    var tap = pendingTap;
    if (Math.abs(e.clientX - tap.x) > 24 || Math.abs(e.clientY - tap.y) > 24) { pendingTap = null; return; }
    setTimeout(function () {
      if (pendingTap !== tap) return; // a real click was delivered and handled it
      pendingTap = null;
      if (tap.el.isConnected) return; // node survived — the click went through normally
      var again = findBySignature(tap.sig);
      if (again) { lastActSig = tap.sig; handleAction(again.dataset.act, again); }
    }, 0);
  }, true);

  // Wave 18(12) — once a table is actually scrolled, retire its edge-fade cue
  // (scroll doesn't bubble, so listen in the capture phase).
  document.addEventListener('scroll', function (e) {
