          if (state.attendance[k][id]) {
            delete state.attendance[k][id];
            if (!Object.keys(state.attendance[k]).length) delete state.attendance[k];
          }
        });
        // Wave 3: strip fee-collection marks + advancement record
        Object.keys(state.collected).forEach(function (k) {
          if (state.collected[k][id]) {
            delete state.collected[k][id];
            if (!Object.keys(state.collected[k]).length) delete state.collected[k];
          }
        });
        delete state.advancement[id];
        // Wave 4: strip the scout's other-fundraiser sales
        state.fundraisers.forEach(function (fr5) {
          fr5.sales = fr5.sales.filter(function (sale) { return sale.scoutId !== id; });
        });
        // Wave 5: unlink (don't delete) the scout's derby cars — a car is a physical
        // entry, so preserve it as a freeform racer, keeping the name and any times.
        state.derby.cars.forEach(function (c) {
          if (c.scoutId === id) {
            if (!c.racerName && goneScout) c.racerName = goneScout.name;
            if (!c.den && goneScout && goneScout.den) c.den = goneScout.den;
            c.scoutId = null;
          }
        });
        // Wave 14: drop popcorn hand-outs pointed at the deleted scout.
        state.inventory.distributions = state.inventory.distributions.filter(function (dst) {
          return !(dst.target.kind === 'scout' && dst.target.id === id);
        });
        commit();
      });
      return;
    }
    if (act.indexOf('del-fundraiser-sale:') === 0) {
      arm(act, function () {
        var parts = act.split(':');
        var frS = getFundraiser(parts[1]);
        if (frS) { frS.sales = frS.sales.filter(function (sale) { return sale.id !== parts[2]; }); commit(); }
      });
      return;
    }
    if (act.indexOf('del-fundraiser:') === 0) {
      arm(act, function () {
        var fid = act.split(':')[1];
        state.fundraisers = state.fundraisers.filter(function (fr) { return fr.id !== fid; });
        commit();
      });
      return;
    }
    if (act.indexOf('del-car:') === 0) {
      arm(act, function () {
        var cid = act.split(':')[1];
        state.derby.cars = state.derby.cars.filter(function (c) { return c.id !== cid; });
        commit();
      });
      return;
    }
    if (act.indexOf('del-inv-product:') === 0) {
      arm(act, function () {
        var pid = act.split(':')[1];
        state.inventory.products = state.inventory.products.filter(function (p) { return p.id !== pid; });
        // Drop hand-outs of a product that no longer exists.
        state.inventory.distributions = state.inventory.distributions.filter(function (d) { return d.productId !== pid; });
        commit();
      });
      return;
    }
    if (act.indexOf('del-award:') === 0) {
      // Wave 19(18) — low-stakes: single tap + Undo toast.
      var dwId = act.split(':')[1];
      var dwIx = -1;
      state.derby.awards.forEach(function (aw, i) { if (aw.id === dwId) dwIx = i; });
      if (dwIx === -1) return;
      var dwGone = state.derby.awards.splice(dwIx, 1)[0];
      deleteWithUndo(dwGone.award || 'design award', function () {
        state.derby.awards.splice(Math.min(dwIx, state.derby.awards.length), 0, dwGone);
      });
      return;
    }
    if (act.indexOf('del-distribution:') === 0) {
      // Wave 18(21) — low-stakes: single tap + Undo toast (was two-tap armed).
      var ddId = act.split(':')[1];
      var ddIx = -1;
      state.inventory.distributions.forEach(function (d, i) { if (d.id === ddId) ddIx = i; });
      if (ddIx === -1) return;
      var ddGone = state.inventory.distributions.splice(ddIx, 1)[0];
      deleteWithUndo('hand-out', function () {
        state.inventory.distributions.splice(Math.min(ddIx, state.inventory.distributions.length), 0, ddGone);
      });
      return;
    }
  }

  function handleChange(el) {
    // Parent phase / join gates — neither renders an editable control, so nothing here
    // should ever fire for them.
    if (parentMode() || gateMode()) return;
    var ch = el.dataset.ch;
    // Wave 11 — new-storefront name draft is transient; sync it without persisting/re-rendering.
    if (ch === 'sf-new-name') { ui.sfDraft.name = el.value; return; }
    if (ch === 'commission') { state.commissionPct = el.value; commit(); return; }
    if (ch === 'goal') { state.goalCents = toCents(el.value); commit(); return; }
    if (ch === 'cash-goal') { state.cashGoalCents = toCents(el.value); commit(); return; }
    if (ch === 'cash-via-te') { state.cashThroughTrailsEnd = el.checked; commit(); return; }
    if (ch === 'pack-name') { state.packName = el.value.trim(); commit(); return; }
    if (ch === 'fr-goal') {
      var frG = getFundraiser(el.dataset.id);
      if (frG) { frG.goalCents = toCents(el.value); commit(); }
      return;
    }
    // Wave 17 — opt a fundraiser's total into the Budget's funds-in.
    if (ch === 'fr-count') {
      var frC = getFundraiser(el.dataset.id);
      if (frC) { frC.countInFunds = el.checked; commit(); }
      return;
    }
    // Wave 8: reward tiers
    if (ch === 'tier-dues') { state.rewardTiers.duesCents = toCents(el.value); commit(); return; }
    if (ch === 'tier-name' || ch === 'tier-threshold' || ch === 'tier-reward') {
      var tier = state.rewardTiers.tiers.find(function (t) { return t.id === el.dataset.id; });
      if (!tier) return;
      if (ch === 'tier-name') tier.name = el.value;
      else if (ch === 'tier-reward') tier.reward = el.value;
      else tier.thresholdCents = toCents(el.value);
      commit(); return;
    }
    if (ch === 'rsvp-adults') {
      var rEv = state.rsvps[el.dataset.key];
      var rRec = rEv && rEv[el.dataset.scout];
      if (rRec && rRec.s === 'yes') {
        var rN = parseInt(el.value, 10);
        rRec.adults = isFinite(rN) && rN > 0 ? Math.min(9, rN) : 0;
        commit();
      }
      return;
    }
    if (ch === 'att-mark') {
      var aMap = state.attendance[el.dataset.id];
      if (el.checked) {
        if (!aMap) aMap = state.attendance[el.dataset.id] = {};
        aMap[el.dataset.scout] = true;
      } else if (aMap) {
        delete aMap[el.dataset.scout];
        if (!Object.keys(aMap).length) delete state.attendance[el.dataset.id];
      }
      commit(); return;
    }
    if (ch === 'collect-mark') {
      // Wave 3 — fee collected checkbox: { expenseId: { scoutId: true } }
      var cMap = state.collected[el.dataset.id];
      if (el.checked) {
        if (!cMap) cMap = state.collected[el.dataset.id] = {};
        cMap[el.dataset.scout] = true;
      } else if (cMap) {
        delete cMap[el.dataset.scout];
        if (!Object.keys(cMap).length) delete state.collected[el.dataset.id];
      }
      commit(); return;
    }
    if (ch === 'sync-pass') { setSyncPass(el.value); render(); return; }
    // Accounts: admin changes a member's role (writes directly to the members doc, NOT via commit()).
    if (ch === 'member-role') { setMemberRole(el.dataset.uid, el.value); return; }
    // Join link phase — the self-serve config doc (admin-only; never touches the ledger).
    if (ch === 'join-open') { writeJoinConfig({ open: el.checked }); return; }
    if (ch === 'join-standings') { writeJoinConfig({ showStandings: el.checked }); return; }
    // Wave 19(4/23/24) — per-scout roster fields.
    if (ch === 'scout-renew' || ch === 'scout-denlabel' || ch === 'scout-note' || ch === 'scout-den') {
      var scEd = getScout(el.dataset.id);
      if (!scEd) return;
      if (ch === 'scout-renew') scEd.renewalMonth = el.value;
      else if (ch === 'scout-denlabel') scEd.denLabel = el.value;
      else if (ch === 'scout-den') scEd.den = DENS.indexOf(el.value) === -1 ? '' : el.value;
      else scEd.note = el.value;
      commit(); return;
    }
    if (ch.indexOf('ldr-') === 0) {
      var ldr = state.leaders.find(function (x) { return x.id === el.dataset.id; });
      if (!ldr) return;
      if (ch === 'ldr-name') ldr.name = el.value.trim();
      else if (ch === 'ldr-role') ldr.role = el.value.trim();
      else if (ch === 'ldr-phone') ldr.phone = el.value.trim();
      else if (ch === 'ldr-email') ldr.email = el.value.trim();
      else if (ch === 'ldr-syt') ldr.sytExpiry = el.value;
      else if (ch === 'ldr-sytdone') ldr.sytCompleted = el.value; // Wave 19(20)
      else if (ch === 'ldr-renew') ldr.renewalMonth = el.value;
      else if (ch === 'ldr-notes') ldr.notes = el.value;
      commit(); return;
    }
    // Budget fields
    if (ch === 'bud-year') {
      var y = parseInt(el.value, 10);
      if (isFinite(y)) { state.budget.programYear = y; commit(); }
      return;
    }
    // Wave 17 — the ONE signed money field: a rollover shortfall must be re-enterable.
    if (ch === 'bud-start') { state.budget.startingBalance = toCentsSigned(el.value); commit(); return; }
    if (ch === 'act-name' || ch === 'act-est' || ch === 'act-actual' || ch === 'act-date' || ch === 'act-perscout' || ch === 'act-familypays') {
      var act = state.budget.activities.find(function (a) { return a.id === el.dataset.id; });
      if (!act) return;
      if (ch === 'act-name') act.name = el.value;
      else if (ch === 'act-est') act.estCents = toCents(el.value);
      else if (ch === 'act-actual') act.actualCents = toCents(el.value);
      else if (ch === 'act-perscout') act.perScout = el.checked;   // Wave 17
      else if (ch === 'act-familypays') act.familyPays = el.checked; // Wave 17
      else act.date = el.value;
      commit(); return;
    }
    if (ch === 'mtg-kind' || ch === 'mtg-den' || ch === 'mtg-time' || ch === 'mtg-note' || ch === 'mtg-adv') {
      var mtg = getMeeting(el.dataset.id);
      if (!mtg) return;
      if (ch === 'mtg-kind') { mtg.kind = el.value; if (mtg.kind === 'pack') { mtg.den = ''; mtg.adventure = ''; } }
      else if (ch === 'mtg-den') mtg.den = el.value;
      else if (ch === 'mtg-time') mtg.time = el.value;
      else if (ch === 'mtg-adv') mtg.adventure = el.value;
      else mtg.note = el.value;
      commit(); return;
    }
    if (ch === 'exp-name' || ch === 'exp-est' || ch === 'exp-actual' || ch === 'exp-perscout' || ch === 'exp-familypays') {
      var exp = state.budget.expenses.find(function (e) { return e.id === el.dataset.id; });
      if (!exp) return;
      if (ch === 'exp-name') exp.name = el.value;
      else if (ch === 'exp-est') exp.estCents = toCents(el.value);
      else if (ch === 'exp-actual') exp.actualCents = toCents(el.value);
      else if (ch === 'exp-familypays') exp.familyPays = el.checked; // Wave 17
      else exp.perScout = el.checked;
      commit(); return;
    }
    if (ch === 'sf-name' || ch === 'sf-date') {
      var sf = getStorefront(el.dataset.id);
      if (!sf) return;
      if (ch === 'sf-name') {
        // Wave 18(32) — an emptied name reverts, but SAY so (change fires once on
        // blur, not per keystroke, so this toasts once).
        var sfNm = el.value.trim();
        if (sfNm) sf.name = sfNm;
        else showToast('Name can’t be empty — kept the old one.');
      } else { sf.date = el.value; sortStorefronts(); }
      commit(); return;
    }
    // Wave 14: Inventory
    if (ch === 'inv-order-total') { state.inventory.orderTotalCents = toCents(el.value); commit(); return; }
    if (ch === 'inv-comm') { state.inventory.commissionPct = el.value; commit(); return; }
    if (ch === 'inv-name' || ch === 'inv-percase' || ch === 'inv-cases' || ch === 'inv-price') {
      var invP = invProduct(el.dataset.id);
      if (!invP) return;
      if (ch === 'inv-name') invP.name = el.value;
      else if (ch === 'inv-price') invP.unitPriceCents = toCents(el.value);
      else {
        var iv = parseInt(el.value, 10);
        iv = (isFinite(iv) && iv > 0) ? iv : 0;
        if (ch === 'inv-percase') invP.perCase = iv; else invP.cases = iv;
      }
      commit(); return;
    }
    // Wave 5: Pinewood Derby
    if (ch === 'derby-name') { state.derby.name = el.value; commit(); return; }
    if (ch === 'derby-date') { state.derby.date = el.value; commit(); return; }
    if (ch === 'derby-lanes') {
      var ln = parseInt(el.value, 10);
      state.derby.lanes = isFinite(ln) ? Math.min(8, Math.max(1, ln)) : 4;
      commit(); return;
    }
    if (ch === 'derby-weigh' || ch === 'derby-note' || ch === 'derby-den' || ch === 'derby-time') {
      var car = state.derby.cars.find(function (c) { return c.id === el.dataset.id; });
      if (!car) return;
      if (ch === 'derby-weigh') car.weighedIn = el.checked;
      else if (ch === 'derby-note') car.inspectNote = el.value;
      else if (ch === 'derby-den') car.den = el.value;
      else {
        var slot = parseInt(el.dataset.slot, 10);
        if (!isFinite(slot) || slot < 0) return;
        var tv = parseFloat(el.value);
        // A positive number records that run; anything else clears the slot (0 = empty,
        // ignored by carStats and dropped by normalizeState on the next load).
        car.times[slot] = (isFinite(tv) && tv > 0) ? tv : 0;
      }
      commit(); return;
    }
    var sf2 = getStorefront(el.dataset.sf);
    if (!sf2) return;
    var b = sf2.blocks.find(function (x) { return x.id === el.dataset.id; });
    if (!b) return;
    if (ch === 'b-label') {
      // Wave 18(32) — same empty-name revert toast as sf-name (once, on blur).
      var bNm = el.value.trim();
      if (bNm) b.label = bNm;
      else showToast('Name can’t be empty — kept the old one.');
      commit(); return;
    }
    if (ch === 'b-start') { b.start = el.value.trim(); commit(); return; }
    if (ch === 'b-end') { b.end = el.value.trim(); commit(); return; }
    if (ch === 'b-sales') { b.salesCents = toCents(el.value); commit(); return; }
    if (ch === 'b-don') { b.donationsCents = toCents(el.value); commit(); return; }
    if (ch === 'b-card') { b.cardCents = toCents(el.value); commit(); return; } // Wave 17
    if (ch === 'weight') {
      var a = b.assignments.find(function (x) { return x.scoutId === el.dataset.scout; });
      if (a) {
        var w = parseFloat(el.value);
        a.weight = isFinite(w) && w >= 0 ? w : 1;
        commit();
      }
      return;
    }
    if (ch === 'assign') {
      if (el.value) {
        b.assignments.push({ scoutId: el.value, weight: 1 });
        commit();
      }
      return;
    }
    // Wave 16 — add an adult (leader id) to this block.
    if (ch === 'adult-assign') {
      if (el.value && getLeader(el.value)) {
        if (!Array.isArray(b.adults)) b.adults = [];
        if (b.adults.indexOf(el.value) === -1) { b.adults.push(el.value); commit(); }
        else render(); // already on the block — just reset the select
      }
      return;
    }
  }

  function handleForm(f) {
    if (parentMode() || gateMode()) return; // Parent phase / join gates — neither renders a form
    var kind = f.dataset.form;
    var fd = new FormData(f);
    // Parent phase — admin invites someone by email (accounts layer; never touches the ledger).
    if (kind === 'invite-member') {
      createInvite(String(fd.get('email') || ''), String(fd.get('role') || ''));
      return;
    }
    if (kind === 'add-scout') {
      var name = String(fd.get('name') || '').trim();
      if (!name) return;
      state.scouts.push({ id: uid(), name: name, den: String(fd.get('den') || '').trim(), archived: false, renewalMonth: '', denLabel: '', note: '' });
      state.scouts.sort(function (a, b) { return a.name.localeCompare(b.name); });
      commit(); return;
    }
    if (kind === 'add-storefront') {
      // Wave 11 — create the same store on every queued date (plus the current date-input value).
      var sname = String(ui.sfDraft.name || '').trim() || String(fd.get('name') || '').trim();
      if (!sname) { showToast('Enter a store or location'); return; }
      var sfDateEl = document.getElementById('sfDateInput');
      var targets = ui.sfDraft.dates.slice();
      var curDate = sfDateEl ? sfDateEl.value : '';
      if (curDate && targets.indexOf(curDate) < 0) targets.push(curDate);
      if (!targets.length) { showToast('Pick a date, or add several'); return; }
      var sfKey = sname.toLowerCase();
      var added = 0, skipped = 0;
      targets.forEach(function (d) {
        var dup = state.storefronts.some(function (sf) {
          return (sf.date || '') === d && sf.name.trim().toLowerCase() === sfKey;
        });
        if (dup) { skipped++; return; }
        addStorefront(sname, d);
        added++;
      });
      ui.sfDraft = { name: '', dates: [] };
      commit();
      showToast('Added ' + added + ' storefront' + (added === 1 ? '' : 's') + (skipped ? ', skipped ' + skipped + ' already there' : ''));
      return;
    }
    if (kind === 'add-entry') {
      var scoutId = f.dataset.scout;
      var sales = toCents(fd.get('sales'));
      var don = toCents(fd.get('donations'));
      if (!sales && !don) return;
      state.entries.push({
        id: uid(), scoutId: scoutId,
        kind: String(fd.get('kind') || 'wagon'),
        date: String(fd.get('date') || ''),
        salesCents: sales, donationsCents: don
      });
      commit(); return;
    }
    if (kind === 'adv-add-elect') {
      // Wave 3 — add an elective (datalist offers the rank's official list; free text allowed).
      // Adding means "mark done" — only done/awarded statuses exist in state.
      var aSid = f.dataset.scout;
      var aName = String(fd.get('name') || '').trim();
      if (!aSid || !aName || !getScout(aSid)) return;
      var aRec2 = state.advancement[aSid];
      if (aRec2 && aRec2.elect && aRec2.elect[aName]) { showToast('Already tracking that elective'); return; }
      advCycle(aSid, 'elect', aName); // blank → done, commits + re-renders
      return;
    }
    if (kind === 'add-fundraiser') {
      var frName = String(fd.get('name') || '').trim();
      if (!frName) return;
      state.fundraisers.push({ id: uid(), name: frName, goalCents: toCents(fd.get('goal')), sales: [], countInFunds: false });
      commit(); return;
    }
    if (kind === 'add-reward-tier') {
      // Wave 8 — need at least a name or a reach amount to make a meaningful tier.
      var tName = String(fd.get('name') || '').trim();
      var tThresh = toCents(fd.get('threshold'));
      var tReward = String(fd.get('reward') || '').trim();
      if (!tName && !tThresh && !tReward) return;
      state.rewardTiers.tiers.push({ id: uid(), name: tName, thresholdCents: tThresh, reward: tReward });
      commit(); return;
    }
    if (kind === 'add-fundraiser-sale') {
      var frSale = getFundraiser(f.dataset.id);
      if (!frSale) return;
      var saleScout = String(fd.get('scout') || '');
      var saleCents = toCents(fd.get('amount'));
      if (!saleScout || !getScout(saleScout) || !saleCents) return;
      var sale = { id: uid(), scoutId: saleScout, cents: saleCents };
      var sDate = String(fd.get('date') || '');
      if (sDate) sale.date = sDate;
      var sNote = String(fd.get('note') || '').trim();
      if (sNote) sale.note = sNote;
      frSale.sales.push(sale);
      commit(); return;
    }
    if (kind === 'add-distribution') {
      // Wave 14 — hand popcorn to a den or scout (or record a return).
      var dProdId = String(fd.get('product') || '');
      if (!invProduct(dProdId)) { showToast('Pick a product'); return; }
      var dTargetRaw = String(fd.get('target') || '');
      var dTarget = null;
      if (dTargetRaw.indexOf('den:') === 0) {
        var dDen = dTargetRaw.slice(4);
        if (DENS.indexOf(dDen) === -1) { showToast('Pick who it’s going to'); return; }
        dTarget = { kind: 'den', den: dDen };
      } else if (dTargetRaw.indexOf('scout:') === 0) {
        var dScoutId = dTargetRaw.slice(6);
        if (!getScout(dScoutId)) { showToast('Pick who it’s going to'); return; }
        dTarget = { kind: 'scout', id: dScoutId };
      } else if (dTargetRaw.indexOf('sf:') === 0) {
        // Wave 19(17) — stock for a specific storefront.
        var dSfId = dTargetRaw.slice(3);
        if (!getStorefront(dSfId)) { showToast('Pick who it’s going to'); return; }
        dTarget = { kind: 'storefront', id: dSfId };
      } else if (dTargetRaw === 'trunk') {
        // Wave 19(17) — generic storefront trunk stock.
        dTarget = { kind: 'trunk' };
      } else { showToast('Pick who it’s going to'); return; }
      var dQty = parseInt(String(fd.get('containers') || '').trim(), 10);
      if (!isFinite(dQty) || dQty === 0) { showToast('Enter a number of containers'); return; }
      if (fd.get('isReturn')) dQty = -Math.abs(dQty); // "Return" flips a positive to a subtraction
      var dist = { id: uid(), productId: dProdId, target: dTarget, containers: dQty };
      var dDate = String(fd.get('date') || '');
      if (dDate) dist.date = dDate;
      var dNote = String(fd.get('note') || '').trim();
      if (dNote) dist.note = dNote;
      state.inventory.distributions.push(dist);
      commit(); return;
    }
    if (kind === 'mtg-repeat') {
      // Wave 19(22) — bulk-create N more meetings on subsequent same-weekday dates.
      // Copies kind/den/time/note only — NOT the adventure (each week differs).
      // DST-safe: Date(y, m, d + 7i) local date math, same as the storefront Add weekly.
      var rMtg = getMeeting(f.dataset.id);
      ui.repeatOffer = null;
      if (!rMtg || !rMtg.date) { render(); return; }
      var rN = parseInt(String(fd.get('weeks') || ''), 10);
      if (!isFinite(rN) || rN < 1) rN = 1;
      if (rN > 12) rN = 12;
      var rp = rMtg.date.split('-');
      var rBase = new Date(+rp[0], +rp[1] - 1, +rp[2]);
      if (isNaN(rBase.getTime())) { render(); return; }
      for (var ri = 1; ri <= rN; ri++) {
        var rd = new Date(rBase.getFullYear(), rBase.getMonth(), rBase.getDate() + ri * 7);
        var rIso = rd.getFullYear() + '-' + pad2(rd.getMonth() + 1) + '-' + pad2(rd.getDate());
        state.meetings.push({ id: uid(), kind: rMtg.kind, den: rMtg.den || '', date: rIso, time: rMtg.time || '', note: rMtg.note || '', adventure: '' });
      }
      commit();
      showToast('Added ' + rN + ' more weekly ' + (rMtg.kind === 'pack' ? 'pack' : 'den') + ' meeting' + (rN === 1 ? '' : 's'));
      return;
    }
    if (kind === 'add-derby-award') {
      // Wave 19(18) — free-text racer name overrides the picked car; either the award
      // name or a racer is enough to record it.
      var awName = String(fd.get('award') || '').trim();
      var awFree = String(fd.get('racer') || '').trim();
      var awCarId = String(fd.get('car') || '');
      var awCar = awCarId ? state.derby.cars.find(function (c) { return c.id === awCarId; }) : null;
      var awRacer = awFree || (awCar ? carRacer(awCar) : '');
      if (!awName && !awRacer) return;
      state.derby.awards.push({ id: uid(), award: awName, racerName: awRacer });
      commit(); return;
    }
    if (kind === 'add-car') {
      // Wave 5 — check in a derby car. Identity can be a scout, a freeform name, or
      // just a car number (open-class). Freeform name overrides the linked scout.
      var cnum = parseInt(String(fd.get('number') || '').trim(), 10);
      var hasNum = isFinite(cnum) && cnum > 0;
      var cScout = String(fd.get('scout') || '');
      if (cScout && !getScout(cScout)) cScout = '';
      var cName = String(fd.get('racer') || '').trim();
      var cDen = String(fd.get('den') || '');
      if (DENS.indexOf(cDen) === -1) cDen = '';
      if (!cDen && cScout) { var csc = getScout(cScout); if (csc && csc.den) cDen = csc.den; }
      if (!hasNum && !cScout && !cName) return; // need at least one identifier
      state.derby.cars.push({
        id: uid(),
        number: hasNum ? cnum : null,
        scoutId: cScout || null,
        racerName: cName,
        den: cDen,
        weighedIn: false,
        inspectNote: '',
        times: []
      });
      commit(); return;
    }
  }

  document.getElementById('fleurSlot').innerHTML = FLEUR;
  // Join link phase — read ?pack=&join= (or the hash equivalent) BEFORE the first paint, so
  // a link visitor's very first frame is the welcome gate, and scrub them out of the URL.
  consumeJoinParams();
  render();
  // Wave 15 — surface a corrupt-load only after toastHost is rendered into a live page.
  if (loadBackupKept) showToast('Couldn’t read saved data — a backup copy was kept.');
  syncStart();
})();
</script>
