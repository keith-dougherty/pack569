<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Ideal Year of Scouting</title>
<style>
  /* ---------- Tokens ---------- */
  :root {
    --ground: #F6EFDF;
    --surface: #FFFDF7;
    --surface-2: #EFE6D2;
    --ink: #22303F;
    --ink-soft: #5B6875;
    --line: #E0D6BF;
    --accent: #C8820A;        /* popcorn gold */
    --accent-soft: #F4E3C2;
    --accent-text: #8A5A06;
    --navy: #2C4E76;          /* cub scout blue */
    --navy-ink: #FCF6E8;
    --good: #256B41;
    --evt-meeting: #2563A8;
    --evt-meeting-soft: #DCE9F6;
    --evt-pack: #6B4FA3;
    --evt-pack-ink: #FFFFFF;
    --bad: #AE4432;
    --shadow: 0 1px 3px rgba(34, 48, 63, 0.08);
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --ground: #151B23;
      --surface: #202935;
      --surface-2: #293442;
      --ink: #ECE5D3;
      --ink-soft: #99A4B2;
      --line: #334050;
      --accent: #E6A93F;
      --accent-soft: #3A3220;
      --accent-text: #E6A93F;
      --navy: #1C2F47;
      --navy-ink: #F2E9D5;
      --good: #6FC495;
      --evt-meeting: #6FA8E0;
      --evt-meeting-soft: #26374A;
      --evt-pack: #A78BDB;
      --evt-pack-ink: #221340;
      --bad: #E07B67;
      --shadow: 0 1px 3px rgba(0, 0, 0, 0.35);
    }
  }
  :root[data-theme="dark"] {
    --ground: #151B23;
    --surface: #202935;
    --surface-2: #293442;
    --ink: #ECE5D3;
    --ink-soft: #99A4B2;
    --line: #334050;
    --accent: #E6A93F;
    --accent-soft: #3A3220;
    --accent-text: #E6A93F;
    --navy: #1C2F47;
    --navy-ink: #F2E9D5;
    --good: #6FC495;
    --evt-meeting: #6FA8E0;
    --evt-meeting-soft: #26374A;
    --evt-pack: #A78BDB;
    --evt-pack-ink: #221340;
    --bad: #E07B67;
    --shadow: 0 1px 3px rgba(0, 0, 0, 0.35);
  }
  :root[data-theme="light"] {
    --ground: #F6EFDF;
    --surface: #FFFDF7;
    --surface-2: #EFE6D2;
    --ink: #22303F;
    --ink-soft: #5B6875;
    --line: #E0D6BF;
    --accent: #C8820A;
    --accent-soft: #F4E3C2;
    --accent-text: #8A5A06;
    --navy: #2C4E76;
    --navy-ink: #FCF6E8;
    --good: #256B41;
    --evt-meeting: #2563A8;
    --evt-meeting-soft: #DCE9F6;
    --evt-pack: #6B4FA3;
    --evt-pack-ink: #FFFFFF;
    --bad: #AE4432;
    --shadow: 0 1px 3px rgba(34, 48, 63, 0.08);
  }

  * { box-sizing: border-box; }
  html, body { margin: 0; }
  body {
    background: var(--ground);
    color: var(--ink);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    font-size: 16px;
    line-height: 1.45;
    -webkit-font-smoothing: antialiased;
  }
  .display { font-family: Rockwell, "Roboto Slab", "Courier New", serif; }

  /* ---------- Header ---------- */
  .topbar {
    background: var(--navy);
    color: var(--navy-ink);
    padding: 14px 16px 0;
    position: sticky;
    top: 0;
    z-index: 20;
    box-shadow: var(--shadow);
  }
  .topbar-inner { max-width: 760px; margin: 0 auto; }
  .wordmark {
    font-family: Rockwell, "Roboto Slab", serif;
    font-size: 1.25rem;
    letter-spacing: 0.02em;
    margin: 0;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .fleur { color: var(--accent); flex-shrink: 0; display: inline-flex; }
  .fleur svg { display: block; }
  .wordmark .gold { color: var(--accent); }
  .wordmark small {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    font-size: 0.72rem;
    font-weight: 500;
    letter-spacing: 0.09em;
    text-transform: uppercase;
    opacity: 0.75;
  }
  .tabs { display: flex; gap: 4px; margin-top: 10px; overflow-x: auto; scrollbar-width: none; }
  .tabs::-webkit-scrollbar { display: none; }
  .tab {
    appearance: none;
    border: none;
    background: transparent;
    color: var(--navy-ink);
    opacity: 0.7;
    font: inherit;
    font-weight: 600;
    font-size: 0.92rem;
    padding: 8px 14px 10px;
    border-radius: 8px 8px 0 0;
    cursor: pointer;
    flex: 0 0 auto;
    white-space: nowrap;
  }
  .tab:hover { opacity: 0.9; }
  .tab.on {
    background: var(--ground);
    color: var(--ink);
    opacity: 1;
  }
  .tab:focus-visible, button:focus-visible, input:focus-visible, select:focus-visible,
  textarea:focus-visible, [role="button"]:focus-visible {
    outline: 2px solid var(--accent);
    outline-offset: 2px;
  }

  /* ---------- Layout ---------- */
  main { max-width: 760px; margin: 0 auto; padding: 16px 12px 80px; }
  .card {
    background: var(--surface);
    border: 1px solid var(--line);
    border-radius: 12px;
    padding: 14px;
    margin-bottom: 14px;
    box-shadow: var(--shadow);
  }
  h2.section {
    font-family: Rockwell, "Roboto Slab", serif;
    font-size: 1.05rem;
    margin: 4px 2px 10px;
  }
  .eyebrow {
    font-size: 0.7rem;
    font-weight: 700;
    letter-spacing: 0.09em;
    text-transform: uppercase;
    color: var(--ink-soft);
    margin: 0 0 4px;
  }
  .muted { color: var(--ink-soft); }
  .small { font-size: 0.85rem; }
  .money { font-variant-numeric: tabular-nums; }
  .row { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
  .spread { display: flex; align-items: center; justify-content: space-between; gap: 10px; flex-wrap: wrap; }

  /* ---------- Controls ---------- */
  button.btn {
    appearance: none;
    font: inherit;
    font-weight: 600;
    font-size: 0.92rem;
    border-radius: 9px;
    border: 1px solid var(--line);
    background: var(--surface);
    color: var(--ink);
    padding: 9px 14px;
    cursor: pointer;
    min-height: 40px;
  }
  button.btn:hover { border-color: var(--accent); }
  button.btn.primary {
    background: var(--accent);
    border-color: var(--accent);
    color: #1A1408;
  }
  button.btn.danger { color: var(--bad); }
  button.btn.danger.armed {
    background: var(--bad);
    border-color: var(--bad);
    color: #FFF;
  }
  :root[data-theme="dark"] button.btn.danger.armed { color: #1A0904; }
  @media (prefers-color-scheme: dark) {
    :root:not([data-theme="light"]) button.btn.danger.armed { color: #1A0904; }
  }
  button.btn.ghost { border-color: transparent; background: transparent; }
  button.btn.small { padding: 5px 10px; min-height: 32px; font-size: 0.85rem; }
  input, select {
    font: inherit;
    color: var(--ink);
    background: var(--surface);
    border: 1px solid var(--line);
    border-radius: 8px;
    padding: 9px 10px;
    min-height: 40px;
    max-width: 100%;
  }
  input.money-in { width: 110px; text-align: right; font-variant-numeric: tabular-nums; }
  input.weight-in { width: 74px; text-align: center; font-variant-numeric: tabular-nums; }
  input.time-in { width: 128px; color-scheme: light dark; }
  label.fld { display: flex; flex-direction: column; gap: 4px; font-size: 0.78rem; font-weight: 600; color: var(--ink-soft); }

  /* ---------- Tables ---------- */
  .tbl-wrap { overflow-x: auto; }
  table { border-collapse: collapse; width: 100%; font-size: 0.92rem; }
  th, td { text-align: left; padding: 7px 10px; border-bottom: 1px solid var(--line); white-space: nowrap; }
  th {
    font-size: 0.72rem;
    text-transform: uppercase;
    letter-spacing: 0.07em;
    color: var(--ink-soft);
  }
  td.num, th.num { text-align: right; font-variant-numeric: tabular-nums; }
  tr:last-child td { border-bottom: none; }

  /* ---------- Bits ---------- */
  .pill {
    display: inline-block;
    font-size: 0.72rem;
    font-weight: 700;
    letter-spacing: 0.04em;
    padding: 2px 8px;
    border-radius: 99px;
    background: var(--accent-soft);
    color: var(--accent-text);
  }
  .pill.navy { background: var(--surface-2); color: var(--ink-soft); }
  .warn {
    background: var(--accent-soft);
    border: 1px solid var(--accent);
    color: var(--ink);
    border-radius: 9px;
    padding: 8px 12px;
    font-size: 0.88rem;
  }
  .stat { display: flex; flex-direction: column; gap: 2px; min-width: 108px; }
  .stat .v { font-family: Rockwell, "Roboto Slab", serif; font-size: 1.3rem; font-variant-numeric: tabular-nums; }
  .stat .l { font-size: 0.72rem; font-weight: 700; letter-spacing: 0.07em; text-transform: uppercase; color: var(--ink-soft); }
  .divider { border: none; border-top: 1px solid var(--line); margin: 12px 0; }
  .bar {
    height: 10px;
    background: var(--surface-2);
    border: 1px solid var(--line);
    border-radius: 99px;
    overflow: hidden;
  }
  .bar-fill { height: 100%; background: var(--accent); border-radius: 99px; }
  .cal-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; gap: 8px; }
  .cal-title { font-family: Rockwell, "Roboto Slab", serif; font-size: 1rem; }
  .cal-nav {
    appearance: none; border: 1px solid var(--line); background: var(--surface); color: var(--ink);
    width: 36px; height: 36px; border-radius: 8px; font-size: 1.1rem; line-height: 1; cursor: pointer;
  }
  .cal-nav:hover { border-color: var(--accent); }
  .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; }
  .cal-dow {
    text-align: center; font-size: 0.66rem; font-weight: 700; letter-spacing: 0.04em;
    color: var(--ink-soft); text-transform: uppercase; padding: 2px 0;
  }
  .cal-cell {
    min-height: 40px; border-radius: 8px; border: 1px solid transparent;
    display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 1px;
    font-size: 0.85rem; font-variant-numeric: tabular-nums; color: var(--ink-soft);
  }
  .cal-cell.today { border-color: var(--ink-soft); }
  .cal-cell.has { background: var(--accent-soft); color: var(--ink); cursor: pointer; font-weight: 650; }
  .cal-cell.has:hover { border-color: var(--accent); }
  .cal-cell.sel { outline: 2px solid var(--accent); outline-offset: 1px; }
  .cal-marks { display: flex; gap: 2px; margin-top: 3px; align-items: center; }
  .cal-dot2 { width: 6px; height: 6px; border-radius: 50%; display: inline-block; flex: 0 0 auto; }
  .cal-more { font-size: 0.6rem; color: var(--ink-soft); font-weight: 700; line-height: 1; }
  .dot-store { background: var(--accent); }
  .dot-store-open { background: transparent; border: 1.6px solid var(--accent); }
  .dot-pack { background: var(--evt-pack); }
  .dot-act { background: var(--good); }
  .dot-mtg { background: var(--evt-meeting); }
  .ev { padding: 8px 0; border-bottom: 1px solid var(--line); }
  .ev:last-child { border-bottom: none; }
  .ev-meeting { background: var(--surface-2); border: 1px solid var(--line); border-radius: 10px; padding: 10px; margin: 8px 0; }
  .ev-badge {
    display: inline-block; font-size: 0.66rem; font-weight: 700; letter-spacing: 0.04em;
    padding: 2px 7px; border-radius: 99px; vertical-align: middle;
  }
  .badge-den { background: var(--evt-meeting-soft); color: var(--evt-meeting); }
  .badge-pack { background: var(--evt-pack); color: var(--evt-pack-ink); }
  .badge-act { background: color-mix(in srgb, var(--good) 20%, transparent); color: var(--good); }
  .arow { display: flex; flex-wrap: wrap; gap: 6px; align-items: center; padding: 5px 0; border-bottom: 1px dashed var(--line); }
  .arow:last-of-type { border-bottom: none; }
  .arow .aname { flex: 1 1 140px; min-height: 36px; min-width: 0; }
  .arow .adate { flex: 0 0 auto; min-height: 36px; }
  .arow input.money-in { width: 88px; min-height: 36px; }
  .bmonth { padding: 4px 0; }
  .bmonth + .bmonth { border-top: 1px solid var(--line); margin-top: 10px; padding-top: 12px; }
  .btiny {
    appearance: none; border: 1px solid transparent; background: transparent; color: var(--bad);
    border-radius: 7px; font-size: 0.9rem; cursor: pointer; min-height: 36px; min-width: 36px; padding: 0;
  }
  .btiny:hover { border-color: var(--bad); }
  .erow { display: flex; flex-wrap: wrap; gap: 6px; align-items: center; padding: 6px 0; border-bottom: 1px dashed var(--line); }
  .erow:last-of-type { border-bottom: none; }
  .erow .ename { flex: 1 1 150px; min-height: 36px; min-width: 0; }
  .erow input.money-in { width: 92px; min-height: 36px; }
  .erow .perscout { display: inline-flex; align-items: center; gap: 5px; font-size: 0.8rem; color: var(--ink-soft); white-space: nowrap; }
  .erow .perscout input { min-height: auto; width: auto; }
  .tier-row { display: flex; flex-wrap: wrap; gap: 6px; align-items: center; padding: 6px 0; border-bottom: 1px dashed var(--line); }
  .tier-row:first-of-type { border-top: 1px solid var(--line); }
  .tier-row .tname { flex: 1 1 130px; min-height: 36px; min-width: 0; }
  .tier-row .treward { flex: 1 1 130px; min-height: 36px; min-width: 0; }
  .tier-row input.money-in { width: 92px; min-height: 36px; }
  .empty {
    text-align: center;
    color: var(--ink-soft);
    padding: 28px 12px;
    border: 1.5px dashed var(--line);
    border-radius: 12px;
    margin-bottom: 14px;
  }
  .list-row {
    display: flex; justify-content: space-between; align-items: center; gap: 10px;
    padding: 12px 4px; border-bottom: 1px solid var(--line); cursor: pointer;
  }
  .list-row:last-child { border-bottom: none; }
  .list-row:hover .lr-name { color: var(--accent-text); }
  .lr-name { font-weight: 650; }
  .assign-row {
    display: flex; align-items: center; gap: 8px; padding: 6px 0;
    border-bottom: 1px dashed var(--line); flex-wrap: wrap;
  }
  .assign-row:last-of-type { border-bottom: none; }
  .assign-name { flex: 1 1 120px; font-weight: 600; }
  .block-card { background: var(--surface-2); border-radius: 10px; padding: 12px; margin-top: 10px; }

  /* ---------- Overlays ---------- */
  .overlay {
    position: fixed; inset: 0; z-index: 40;
    background: color-mix(in srgb, var(--ground) 92%, transparent);
    overflow-y: auto; padding: 20px 12px 60px;
  }
  .overlay-inner { max-width: 680px; margin: 0 auto; }
  textarea.export-box {
    width: 100%; height: 200px; font: 0.8rem/1.4 ui-monospace, Menlo, monospace;
    color: var(--ink); background: var(--surface); border: 1px solid var(--line);
    border-radius: 9px; padding: 10px;
  }
  .summary-sheet { background: var(--surface); border: 1px solid var(--line); border-radius: 12px; padding: 20px; }
  .summary-sheet h1 { font-family: Rockwell, "Roboto Slab", serif; font-size: 1.3rem; margin: 0 0 2px; }

  @media print {
    /* Force light ink-on-white regardless of color scheme — dark tokens print pale text on white paper. */
    :root, :root[data-theme="dark"] {
      --ground: #fff;
      --surface: #fff;
      --surface-2: #EFE6D2;
      --ink: #111;
      --ink-soft: #555;
      --line: #C9C0AC;
      --accent: #8A5A06;
      --accent-text: #8A5A06;
      --accent-soft: #F4E3C2;
      --navy: #2C4E76;
      --navy-ink: #FCF6E8;
      --good: #256B41;
      --bad: #AE4432;
      --evt-meeting: #2563A8;
      --evt-meeting-soft: #DCE9F6;
      --shadow: none;
    }
    .topbar, main, .no-print { display: none !important; }
    .overlay { position: static; padding: 0; background: #fff; }
    .summary-sheet { border: none; box-shadow: none; }
    body { background: #fff; color: #111; }
  }
  @media (prefers-reduced-motion: no-preference) {
    .card { transition: border-color 0.15s ease; }
  }

  /* ---------- Sync & Pack ---------- */
  /* No new tokens — everything derives from existing ones via color-mix, so all four
     theme blocks stay untouched. Dots are mixed toward navy-ink so they read on the
     always-navy topbar in both themes. */
  .hdr-row { display: flex; align-items: center; justify-content: space-between; gap: 10px; }
  .sync-pill {
    appearance: none;
    font: inherit;
    font-size: 0.72rem;
    font-weight: 700;
    letter-spacing: 0.03em;
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 4px 10px;
    border-radius: 99px;
    border: 1px solid color-mix(in srgb, var(--navy-ink) 30%, transparent);
    background: color-mix(in srgb, var(--navy-ink) 10%, transparent);
    color: var(--navy-ink);
    cursor: pointer;
    flex: 0 0 auto;
    white-space: nowrap;
  }
  .sync-pill:hover { border-color: var(--accent); }
  .sync-dot { width: 8px; height: 8px; border-radius: 50%; background: color-mix(in srgb, var(--navy-ink) 55%, transparent); flex: 0 0 auto; }
  .sync-pill.connecting .sync-dot, .sync-pill.offline .sync-dot { background: var(--accent); }
  .sync-pill.online .sync-dot { background: color-mix(in srgb, var(--good) 60%, var(--navy-ink)); }
  @media (max-width: 480px) {
    .sync-pill { padding: 4px 7px; }
    .sync-pill .sync-lbl { display: none; }
  }
  .leader-row { padding: 10px 0; border-bottom: 1px dashed var(--line); }
  .leader-row:last-of-type { border-bottom: none; }
  .leader-row input { min-height: 36px; }
  .pill.bad { background: var(--bad); color: #FFF; }
  :root[data-theme="dark"] .pill.bad { color: #1A0904; }
  @media (prefers-color-scheme: dark) {
    :root:not([data-theme="light"]) .pill.bad { color: #1A0904; }
  }
  .btiny.armed { background: var(--bad); border-color: var(--bad); color: #FFF; }
  :root[data-theme="dark"] .btiny.armed { color: #1A0904; }
  @media (prefers-color-scheme: dark) {
    :root:not([data-theme="light"]) .btiny.armed { color: #1A0904; }
  }
  .toast {
    position: fixed;
    left: 50%;
    bottom: 20px;
    transform: translateX(-50%);
    z-index: 60;
    background: var(--navy);
    color: var(--navy-ink);
    border: 1px solid var(--line);
    border-radius: 99px;
    padding: 8px 16px;
    font-size: 0.85rem;
    font-weight: 600;
    box-shadow: var(--shadow);
    white-space: nowrap;
  }

  /* ---------- Wave 2: RSVP, attendance, seed ---------- */
  /* No new tokens — segment fills reuse --good/--accent/--bad with the same
     ink-override pattern the armed danger buttons use, so all four theme blocks
     stay untouched. */
  .rsvp-wrap { flex: 0 1 auto; max-width: 100%; min-width: 0; }
  .rsvp-wrap.open { flex-basis: 100%; }
  .exp-toggle {
    appearance: none;
    font: inherit;
    font-size: 0.8rem;
    font-weight: 600;
    color: var(--ink-soft);
    background: var(--surface-2);
    border: 1px solid var(--line);
    border-radius: 8px;
    padding: 7px 10px;
    min-height: 36px;
    cursor: pointer;
    display: inline-flex;
    align-items: center;
    gap: 6px;
    max-width: 100%;
    text-align: left;
  }
  .exp-toggle:hover { border-color: var(--accent); }
  .exp-toggle .chev { font-size: 0.7rem; flex: 0 0 auto; }
  .rsvp-list { margin-top: 4px; }
  .rsvp-row {
    display: flex; align-items: center; gap: 8px; padding: 6px 0;
    border-bottom: 1px dashed var(--line); flex-wrap: wrap;
  }
  .rsvp-row:last-child { border-bottom: none; }
  .rsvp-name { flex: 1 1 110px; font-weight: 600; min-width: 0; overflow-wrap: anywhere; }
  .seg { display: inline-flex; border: 1px solid var(--line); border-radius: 9px; overflow: hidden; flex: 0 0 auto; }
  .seg-btn {
    appearance: none;
    font: inherit;
    font-size: 0.8rem;
    font-weight: 600;
    background: var(--surface);
    color: var(--ink-soft);
    border: none;
    border-left: 1px solid var(--line);
    min-height: 36px;
    min-width: 48px;
    padding: 0 10px;
    cursor: pointer;
  }
  .seg-btn:first-child { border-left: none; }
  .seg-btn:hover { color: var(--ink); }
  .seg-btn.on-yes { background: var(--good); color: #FFF; }
  .seg-btn.on-maybe { background: var(--accent); color: #1A1408; }
  .seg-btn.on-no { background: var(--bad); color: #FFF; }
  :root[data-theme="dark"] .seg-btn.on-yes { color: #10241A; }
  :root[data-theme="dark"] .seg-btn.on-no { color: #1A0904; }
  @media (prefers-color-scheme: dark) {
    :root:not([data-theme="light"]) .seg-btn.on-yes { color: #10241A; }
    :root:not([data-theme="light"]) .seg-btn.on-no { color: #1A0904; }
  }
  .rsvp-adults { display: inline-flex; align-items: center; gap: 5px; white-space: nowrap; }
  .adults-in { width: 60px; min-height: 36px; padding: 4px 6px; text-align: center; font-variant-numeric: tabular-nums; }
  .att-row {
    display: flex; align-items: center; gap: 8px; padding: 8px 0;
    border-bottom: 1px dashed var(--line); cursor: pointer; font-size: 0.92rem;

  // Collapsible collect grid for one per-scout item — same pattern as attendance.
  // Wave 17 — generalized to (item, colKey) so per-scout ACTIVITIES share it: expenses
  // keep their legacy bare-id keys in state.collected; activities pass 'act:'+id.
  function renderCollectBlock(e, colKey) {
    var open = !!ui.collectOpen[colKey];

    var outstanding = (activeRoster.length - count) * (e.estCents || 0);

      (outstanding > 0 ? ' · ' + fmt(outstanding) + ' outstanding' : '');

      '<button type="button" class="exp-toggle" data-act="toggle-collect" data-id="' + colKey + '" aria-expanded="' + open + '">' +
      '<span class="chev" aria-hidden="true">' + (open ? '▾' : '▸') + '</span>' + esc(label) + '</button>';
    if (open) {
      h += '<div class="rsvp-list">';
      if (!roster.length) h += '<p class="small muted" style="margin:6px 0 0">Add scouts on the Scouts tab first.</p>';
      roster.forEach(function (s) {
        h += '<label class="att-row"><input type="checkbox" data-ch="collect-mark" data-id="' + colKey + '" data-scout="' + s.id + '"' +
          (cm[s.id] ? ' checked' : '') + ' aria-label="' + esc((e.name || 'Fee') + ' collected from ' + s.name) + '"><span>' + esc(s.name) +
          (s.den ? ' <span class="pill navy">' + esc(s.den) + '</span>' : '') +
          (s.archived ? ' <span class="pill navy">archived</span>' : '') + '</span></label>';
      });

    }

  }

  /* ---------------- Wave 3: advancement (den Adventure board) ---------------- */
  // June-2024 Cub Scout program: each badge of rank = the 6 required Adventures below
  // (Bobcat first) + at least 2 electives. Webelos and Arrow of Light are separate
  // ranks with separate lists.
  // Source: https://hovc.org/cub-scout-required-and-elective-adventures/ (council matrix
  // PDF, last updated 5/25/24), cross-checked against
  // https://scoutermom.com/44730/cub-scout-2024-program-updates/ and consistent with
  // https://www.scouting.org/programs/cub-scouts/adventures/.
  // Elective names drop the rank suffix ("Let's Camp! Wolf" → "Let's Camp!") — the den
  // supplies the rank. Lions have no BB Gun and no Summertime Fun electives (per program).
  // VERIFY against the current handbook each year — adventures get added and renamed.
  var ADVENTURES = {
    'Lion': {
      required: ['Bobcat', 'King of the Jungle', "Lion's Pride", 'Mountain Lion', 'Fun on the Run', "Lion's Roar"],

        'Fish On', 'Curiosity, Intrigue, and Magical Mysteries', 'Tiger Tag', 'Tiger-iffic!', 'Floats and Boats',

    },

    },
    'Bear': {
      required: ['Bobcat', 'Paws for Action', 'Fellowship', 'Bear Habitat', 'Bear Strong', 'Standing Tall'],
      electives: ['Bears on Bikes', "Let's Camp!", 'Critter Care', 'Roaring Laughter', 'Champions for Nature',
        'A Bear Goes Fishing', 'Marble Madness', 'Whittling', 'Bear Afloat', 'Race Time', 'Archery', 'BB Gun',
        'Slingshot', 'Baloo the Builder', 'Balancing Bears', 'Forensics', 'Super Science', 'Chef Tech',
        'Summertime Fun', 'Salmon Run']
    },
    'Webelos': {
      required: ['Bobcat', 'My Community', 'My Family', 'Webelos Walkabout', 'Stronger, Faster, Higher', 'My Safety'],
      electives: ['Pedal Away', "Let's Camp!", 'Aware and Care', 'Champions for Nature', 'Catch the Big One',
        'Yo-yo', "Chef's Knife", 'Paddle Onward', 'Race Time', 'Archery', 'BB Gun', 'Slingshot', 'Build It',

    },

      required: ['Bobcat', 'Citizenship', 'Duty to God', 'Outdoor Adventurer', 'Personal Fitness', 'First Aid'],
      electives: ['Cycling', 'Champions for Nature', 'Fishing', 'Knife Safety', 'Paddle Craft', 'Race Time',
        'Archery', 'BB Gun', 'Slingshot', 'Engineer', 'Estimations', 'Into the Wild', 'Into the Woods',
        'High Tech Outdoors', 'Summertime Fun', 'Swimming']
    }
  };
  // Short column headers for the grid; full names live in the title attr / aria-label.
  var ADV_SHORT = {
    'Bobcat': 'Bobcat', 'King of the Jungle': 'Jungle', "Lion's Pride": 'Pride', 'Mountain Lion': 'Mtn Lion',
    'Fun on the Run': 'Fun Run', "Lion's Roar": 'Roar', 'Team Tiger': 'Team', 'Tiger Circles': 'Circles',
    'Tigers in the Wild': 'Wild', 'Tiger Bites': 'Bites', 'Tiger Roar': 'Roar', 'Council Fire': 'Council',
    'Footsteps': 'Steps', 'Paws on the Path': 'Path', 'Running with the Pack': 'Running', 'Safety in Numbers': 'Safety',
    'Paws for Action': 'Action', 'Fellowship': 'Fellow.', 'Bear Habitat': 'Habitat', 'Bear Strong': 'Strong',
    'Standing Tall': 'Tall', 'My Community': 'Commun.', 'My Family': 'Family', 'Webelos Walkabout': 'Walkabt',
    'Stronger, Faster, Higher': 'Stronger', 'My Safety': 'Safety', 'Citizenship': 'Citizen.', 'Duty to God': 'Duty',
    'Outdoor Adventurer': 'Outdoor', 'Personal Fitness': 'Fitness', 'First Aid': 'First Aid'
  };
  function advRec(scoutId) { return state.advancement[scoutId] || null; }
  function advStatus(scoutId, kind, name) {
    var a = advRec(scoutId);
    return (a && a[kind] && a[kind][name]) || '';
  }
  function advPrune(scoutId) {
    var a = state.advancement[scoutId];
    if (a && !Object.keys(a.req).length && !Object.keys(a.elect).length) delete state.advancement[scoutId];
  }
  function advCycle(scoutId, kind, name) {
    var a = state.advancement[scoutId];
    if (!a) a = state.advancement[scoutId] = { req: {}, elect: {} };
    if (!a[kind]) a[kind] = {};
    var cur = a[kind][name];
    if (!cur) a[kind][name] = 'done';
    else if (cur === 'done') a[kind][name] = 'awarded';
    else { delete a[kind][name]; advPrune(scoutId); }
    commit();
  }
  // Wave 16 — which list an adventure falls under for a scout: their den's required list
  // maps to 'req'; everything else (official electives, free text, unknown, or no den)
  // is an elective — the same bucket custom electives already use.
  function advKindFor(scout, name) {
    var adv = scout && ADVENTURES[scout.den];
    return (adv && adv.required.indexOf(name) !== -1) ? 'req' : 'elect';
  }
  // Wave 16 — one-way upgrade: blank → done. Never touches done/awarded (no downgrade).
  // Does NOT commit — callers batch marks and commit once. Returns true when written.
  function advMarkDone(scoutId, kind, name) {
    if (advStatus(scoutId, kind, name)) return false; // already done or awarded
    var a = state.advancement[scoutId];
    if (!a) a = state.advancement[scoutId] = { req: {}, elect: {} };
    if (!a[kind]) a[kind] = {};
    a[kind][name] = 'done';
    return true;
  }
  function advElectCount(scoutId) {
    var a = advRec(scoutId);
    return a ? Object.keys(a.elect || {}).length : 0; // only done/awarded survive normalize
  }
  function scoutAdvComplete(s) {
    var adv = ADVENTURES[s.den];
    if (!adv) return false;
    var okReq = adv.required.every(function (nm) { return !!advStatus(s.id, 'req', nm); });
    return okReq && advElectCount(s.id) >= 2;
  }
  // Wave 19(30) — non-enforcing nudge: some non-Bobcat adventure is recorded while
  // Bobcat is still blank (the handbook has Bobcat completed first).
  function bobcatNudgeFor(scoutId) {
    if (advStatus(scoutId, 'req', 'Bobcat')) return false;
    var a = advRec(scoutId);
    if (!a) return false;
    var any = false;
    ['req', 'elect'].forEach(function (kk) {
      Object.keys(a[kk] || {}).forEach(function (nm) { if (kk === 'elect' || nm !== 'Bobcat') any = true; });
    });
    return any;
  }
  // One tappable 3-state cell: blank → done (✓ gold) → awarded (★ green) → blank.
  // Wave 19(30): `nudge` adds the amber Bobcat-first tint + title/aria hint.
  function advCellBtn(scoutId, kind, name, nudge) {
    var st = advStatus(scoutId, kind, name);
    var glyph = st === 'awarded' ? '★' : (st === 'done' ? '✓' : '');
    var next = !st ? 'tap to mark done' : (st === 'done' ? 'tap to mark awarded' : 'tap to clear');
    var lbl = name + ': ' + (st || 'not done') + ', ' + next;
    if (nudge) lbl += '. Bobcat is completed first';
    return '<button type="button" class="adv-cell' + (st ? ' ' + st : '') + (nudge ? ' bobcat-nudge' : '') + '" data-act="adv-cycle" data-scout="' + scoutId +
      '" data-kind="' + kind + '" data-name="' + esc(name) + '"' + (nudge ? ' title="Bobcat is completed first"' : '') + ' aria-label="' + esc(lbl) + '">' + glyph + '</button>';
  }
  function renderAdvancement() {
    var h = '<div class="card"><div class="spread">' +
      '<h2 class="section display" style="margin-bottom:0">Advancement</h2>' +
      '<button type="button" class="btn small" data-act="open-shop">Scout Shop list</button></div>' +
      '<p class="small muted" style="margin:6px 0 0">Unofficial at-a-glance tracker — the official record lives in Scoutbook Plus.</p></div>';
    var anyDen = false;
    DENS.forEach(function (den) {
      var adv = ADVENTURES[den];
      var roster = activeScouts().filter(function (s) { return s.den === den; });
      if (!roster.length || !adv) return;
      anyDen = true;
      var denIdx = DENS.indexOf(den);
      var complete = roster.filter(scoutAdvComplete).length;
      // Wave 18(9) — per-den completion bar; the pill stays as the "N of M" label.
      var advPct = Math.round(complete / roster.length * 100);
      h += '<div class="card"><h2 class="section display">' + esc(den) +
        ' <span class="pill navy">' + complete + ' of ' + roster.length + ' scout' + (roster.length === 1 ? '' : 's') + ' complete</span></h2>' +
        '<div class="bar" role="img" aria-label="' + esc(den) + ' den: ' + complete + ' of ' + roster.length + ' scouts complete" style="margin:0 0 10px"><div class="bar-fill" style="width:' + advPct + '%"></div></div>' +
        '<div class="tbl-wrap"><table class="adv-tbl"><caption class="visually-hidden">' + esc(den) + ' den advancement</caption><thead><tr><th scope="col">Scout</th>' +
        adv.required.map(function (nm) {
          return '<th scope="col" title="' + esc(nm) + '">' + esc(ADV_SHORT[nm] || nm) + '</th>';
        }).join('') +
        '<th scope="col">Electives</th></tr></thead><tbody>';
      roster.forEach(function (s) {
        var open = !!ui.advOpen[s.id];
        // Wave 19(23): grouping here stays RANK-based (s.den) on purpose — denLabel is
        // display-only. Wave 19(30): amber nudge on a blank Bobcat once anything else is marked.
        var bobNudge = bobcatNudgeFor(s.id);
        h += '<tr><td>' + esc(s.name) + '</td>' +
          adv.required.map(function (nm) { return '<td>' + advCellBtn(s.id, 'req', nm, nm === 'Bobcat' && bobNudge) + '</td>'; }).join('') +
          '<td><button type="button" class="exp-toggle" data-act="adv-toggle" data-id="' + s.id + '" aria-expanded="' + open +
          '" aria-label="Electives for ' + esc(s.name) + '"><span class="chev" aria-hidden="true">' + (open ? '▾' : '▸') + '</span>' +
          advElectCount(s.id) + '/2+</button></td></tr>';
        if (open) {
          var a = advRec(s.id);
          var names = a ? Object.keys(a.elect || {}).sort() : [];
          h += '<tr><td colspan="' + (adv.required.length + 2) + '" style="white-space:normal"><div class="block-card" style="margin:4px 0 8px;text-align:left">' +
            '<p class="eyebrow">Electives — ' + esc(s.name) + '</p>';
          if (!names.length) h += '<p class="small muted" style="margin:4px 0 8px">No electives tracked yet — 2 are needed for the rank.</p>';
          names.forEach(function (nm) {
            var dkey = 'adv-edel:' + s.id + ':' + nm;
            var darmed = ui.armed === dkey;
            var dtitle = darmed ? 'Tap again to confirm' : 'Remove ' + nm;
            h += '<div class="assign-row"><span class="assign-name">' + esc(nm) + '</span>' +
              advCellBtn(s.id, 'elect', nm) +
              '<button type="button" class="btiny' + (darmed ? ' armed' : '') + '" data-act="adv-edel" data-scout="' + s.id +
              '" data-name="' + esc(nm) + '" aria-label="' + esc(dtitle) + '" title="' + esc(dtitle) + '">✕</button></div>';
          });
          h += '<form data-form="adv-add-elect" data-scout="' + s.id + '" class="row" style="margin-top:8px">' +
            '<input name="name" list="advList-' + denIdx + '" placeholder="Add an elective…" style="flex:1 1 160px;min-height:36px" aria-label="Add an elective for ' + esc(s.name) + '">' +
            '<button class="btn small" type="submit">Add</button></form>' +
            '</div></td></tr>';
        }
      });
      h += '</tbody></table></div>' +
        '<datalist id="advList-' + denIdx + '">' +
        adv.electives.map(function (nm) { return '<option value="' + esc(nm) + '">'; }).join('') +
        '</datalist></div>';
    });
    if (!anyDen) {
      h += '<div class="empty">No active scouts with a den yet. Give each scout a den on the Scouts tab to track their Adventures here.</div>';
    }
    return h;
  }

  /* ---------------- Wave 3: Scout Shop shopping list ---------------- */
  // Everything marked done but not yet awarded, grouped by den — what to buy before
  // the next pack meeting. Scouts without a den land in a 'No den' group so nothing
  // silently drops off the list.
  function shopItems() {
    var byDen = {}, total = 0;
    activeScouts().forEach(function (s) {
      var a = advRec(s.id);
      if (!a) return;
      ['req', 'elect'].forEach(function (kk) {
        Object.keys(a[kk] || {}).forEach(function (nm) {
          if (a[kk][nm] !== 'done') return;
          var den = s.den || 'No den';
          var dm = byDen[den] = byDen[den] || {};
          dm[nm] = (dm[nm] || 0) + 1;
          total += 1;
        });
      });
    });
    // Stable line order: required adventures in rank order first, then the rest A→Z.
    var groups = [];
    DENS.concat(['No den']).forEach(function (den) {
      var dm = byDen[den];
      if (!dm) return;
      var names = Object.keys(dm);
      var reqOrder = (ADVENTURES[den] && ADVENTURES[den].required) || [];
      names.sort(function (a, b) {
        var ia = reqOrder.indexOf(a), ib = reqOrder.indexOf(b);
        if (ia !== -1 || ib !== -1) return (ia === -1 ? 99 : ia) - (ib === -1 ? 99 : ib);
        return a.localeCompare(b);
      });
      groups.push({ den: den, items: names.map(function (nm) { return { name: nm, count: dm[nm] }; }) });
    });
    return { groups: groups, total: total };
  }
  function shopLine(g) {
    return g.items.map(function (it) { return it.name + ' ×' + it.count; }).join(', ');
  }
  function shopText() {
    var list = shopItems();
    var lines = [];
    lines.push((state.packName || 'Pack') + ' — Scout Shop list');
    lines.push('As of ' + new Date().toLocaleDateString('en-US', { month: 'long', day: 'numeric', year: 'numeric' }));
    lines.push('');
    if (!list.total) lines.push('Nothing to buy — every completed adventure has been awarded.');
    list.groups.forEach(function (g) { lines.push(g.den + ' — ' + shopLine(g)); });
    if (list.total) {
      lines.push('');
      lines.push('Total: ' + list.total + ' adventure loop' + (list.total === 1 ? '/pin' : 's/pins'));
    }
    lines.push('');
    lines.push('Complete the official Unit Advancement Report in Scoutbook Plus before purchase.');
    return lines.join('\n');
  }
  function shopAwardAll() {
    var n = 0;
    activeScouts().forEach(function (s) {
      var a = advRec(s.id);
      if (!a) return;
      ['req', 'elect'].forEach(function (kk) {
        Object.keys(a[kk] || {}).forEach(function (nm) {
          if (a[kk][nm] === 'done') { a[kk][nm] = 'awarded'; n += 1; }
        });
      });
    });
    if (n) {
      commit();
      showToast('Marked ' + n + ' adventure' + (n === 1 ? '' : 's') + ' as awarded');
    } else {
      render();
      showToast('Nothing on the list');
    }
  }

  /* ---------------- Wave 2: seed a standard Scouting year ---------------- */
  // Traditional slate by program-month slot (Sept=0 … Aug=11). Activities only, NO
  // dates — the owner assigns dates on the Budget tab once availability is known.
  var SEED_ACTIVITIES = [
    { slot: 0, name: 'School Night — join & recruiting' },
    { slot: 0, name: 'Popcorn kickoff' },
    { slot: 1, name: 'Fall family campout' },
    { slot: 2, name: 'Scouting for Food' },
    { slot: 3, name: 'Holiday pack party' },
    { slot: 4, name: 'Pinewood Derby' },
    { slot: 5, name: 'Blue & Gold banquet' },
    { slot: 6, name: 'Raingutter Regatta' },
    { slot: 7, name: 'Spring hike / service project' },
    { slot: 8, name: 'Crossover & graduation' },
    { slot: 9, name: 'Day camp week' },
    { slot: 10, name: 'Resident camp' }
  ];
  function seedStandardYear() {
    var existing = {};
    state.budget.activities.forEach(function (a) { existing[(a.name || '').trim().toLowerCase()] = 1; });
    var added = 0;
    SEED_ACTIVITIES.forEach(function (t) {
      if (existing[t.name.toLowerCase()]) return; // idempotent — name match, any slot
      state.budget.activities.push({ id: uid(), slot: t.slot, name: t.name, date: '', estCents: 0, actualCents: 0, perScout: false, familyPays: false });
      added += 1;
    });
    if (added) {
      commit();
      showToast('Added ' + added + ' activities — set dates on the Budget tab when they’re known');

  function seedBtn() {
    var armed = ui.armed === 'seed-year';
    return '<button type="button" class="btn small' + (armed ? ' primary' : '') + '" data-act="seed-year">' +
      (armed ? 'Tap again to add the standard slate' : 'Seed the standard year') + '</button>';
  }

  /* ---------------- Sync (optional shared ledger via Firestore) ---------------- */
  // localStorage stays the always-on cache in EVERY mode; Firestore, when enabled,
  // mirrors the whole state as one JSON string in a single doc (packs/{sha256(pass)}).
  // Whole-state-as-one-string keeps writes atomic and stays far under the 1 MiB cap.
  var SYNC_PASS_KEY = 'pack-planner-sync-pass';     // passphrase lives OUTSIDE state on purpose
  var SYNC_DEVICE_KEY = 'pack-planner-sync-device'; // random per-device id to ignore our own writes
  // Pinned SDK — all three URLs verified 200 on gstatic (v12.16.0, checked 2026-07-18).
  var SYNC_SDK_BASE = 'https://www.gstatic.com/firebasejs/12.16.0/';

  var sync = {
    mode: 'local',     // 'local' | 'connecting' | 'online' | 'offline'
    error: '',
    dirty: false,
    clobber: false,    // Wave 18(5) — a newer remote rev was skipped while dirty; merge + warn at push
    pushTimer: null,
    retryTimer: null,
    firstSnap: true,
    session: null,     // token — a passphrase change cancels in-flight work from the old session
    mods: null,        // loaded firebase modules { app, auth, fs }
    app: null,
    db: null,
    docRef: null,
    unsub: null,
    // ---- Accounts (additive, runtime-only — NEVER persisted in the ledger JSON) ----
    docId: null,               // sha256(passphrase) — the pack's doc id, also members/packmeta path key
    user: null,                // Google identity {uid, displayName, email, photoURL} or null (null = anonymous/legacy)
    members: [],               // live roster from packs/{docId}/members — runtime only, lives in Firestore
    myRole: null,              // this user's role: 'admin' | 'editor' | 'viewer' | 'pending' | null
    ownerUid: null,            // packmeta/{docId}.owner — the first person to sign in / claim the pack
    accountsUnavailable: false,// true when packmeta/members reads are permission-denied (legacy rules) → roles NOT enforced
    membersUnsub: null,        // second onSnapshot (the members subcollection)
    redirectChecked: false,    // one-time getRedirectResult() guard (mobile Google fallback)
    // ---- Parent phase (runtime-only, like everything above — never persisted) ----
    feed: null,                // which document this session is subscribed to: 'ledger' | 'parent' | null
    parentView: null,          // the sanitized packs/{docId}/public/view payload (parents/pending only)
    parentUnsub: null,         // onSnapshot for that derived doc
    invites: [],               // outstanding packs/{docId}/invites/* (admins only)
    invitesUnsub: null,        // onSnapshot for the invites subcollection
    invitesUnavailable: false, // invites read denied (older Part C rules) → hide the invite UI ONLY
    // ---- Self-serve join link (runtime-only, never persisted in the ledger) ----
    joinCfg: null,             // packs/{docId}/public/join = { open, mode, code, showStandings }
    joinUnsub: null,           // onSnapshot for that config doc (leaders only)
    joinUnavailable: false,    // join-config read denied (older Part C rules) → hide the admin card ONLY
    joinRejected: null,        // null | 'closed' | 'badcode' — a link visitor who can't join
    deviceId: (function () {
      try {
        var id = localStorage.getItem(SYNC_DEVICE_KEY);
        if (!id) { id = uid(); localStorage.setItem(SYNC_DEVICE_KEY, id); }
        return id;
      } catch (e) { return uid(); }
    })()
  };

  function syncPass() {
    try { return (localStorage.getItem(SYNC_PASS_KEY) || '').trim(); } catch (e) { return ''; }
  }
  function setSyncPass(v) {
    v = String(v || '').trim();
    try {
      if (v) localStorage.setItem(SYNC_PASS_KEY, v);
      else localStorage.removeItem(SYNC_PASS_KEY);
    } catch (e) { /* storage blocked */ }
    syncStop();
    syncStart();
  }

  // ---- Self-serve parent join link ------------------------------------------------------
  // ONE link for everyone — leaders and families alike:  <page-url>?pack=<docId>&join=<code>
  // The visitor taps "Sign in with Google" and lands in the approval queue as 'pending' with
  // NO pack content; an admin then accepts them as editor/viewer/parent. The link never
  // grants access by itself (locked in the rules too — there is no auto-approve path).
  // Nobody needs the passphrase — it stays a leaders-only secret, and a leader's device
  // ignores a stray ?pack= param entirely (activeJoin()).
  //

  function storefrontCoverage(sf) {
    var total = (sf.blocks || []).length;
    var covered = (sf.blocks || []).filter(function (b) { return (b.assignments || []).length > 0; }).length;
    return { covered: covered, total: total, full: total > 0 && covered === total };
  }

  /* ----- Wave 16: adults on storefront blocks (two-deep leadership) ----- */
  function getLeader(id) { return state.leaders.find(function (l) { return l.id === id; }); }
  // Stored ids filtered to leaders that still exist — stale ids drop out here at
  // render/count time (normalizeState only shape-checks, by design).
  function blockAdultLeaders(b) {
    return (b.adults || []).map(getLeader).filter(function (l) { return !!l; });
  }
  // Two-deep predicate: the block has scouts but fewer than 2 resolvable adults.
  // Blocks with zero scouts never warn — empty future blocks are fine.
  function blockNeedsAdults(b) {
    return (b.assignments || []).length >= 1 && blockAdultLeaders(b).length < 2;
  }
  function storefrontNeedsAdults(sf) {
    return (sf.blocks || []).some(blockNeedsAdults);
  }

  function storefrontRow(sf) {
    var t = storefrontTotals(sf);

    return '<div class="list-row" data-act="open-storefront" data-id="' + sf.id + '" role="button" tabindex="0">' +

      '<div class="money" style="font-weight:650">' + (t.combined ? fmt(t.combined) : '<span class="muted">—</span>') + '</div></div>';
  }

  // Calendar month a program slot maps to (Sept=slot0 → month 09, … Aug=slot11 → month 08).
  function slotMonthKey(slot) { return slotYear(slot) + '-' + pad2(slot <= 3 ? slot + 9 : slot - 3); }
  // Inverse: which program slot a real date lands in (Sep=0..Dec=3, Jan=4..Aug=11; empty=0).
  function dateToSlot(iso) {
    var m = +(iso || '').slice(5, 7); // 1..12
    if (!m) return 0;
    return m >= 9 ? m - 9 : m + 3;    // Sep=0..Dec=3, Jan=4..Aug=11
  }
  // Meetings split by kind: den = blue, pack = purple.
  function dotClass(e) {
    if (e.type === 'meeting') return e.m.kind === 'pack' ? 'dot-pack' : 'dot-mtg';

    return 'dot-act';

  // Wave 19(16) — the next 1–2 upcoming dated things (storefront / meeting / dated
  // activity), soonest first. Pure read; [] hides the card entirely.
  function nextUpEvents() {
    var today = todayISO();
    var evs = [];
    state.storefronts.forEach(function (sf) { if ((sf.date || '') >= today) evs.push({ type: 'storefront', date: sf.date, sf: sf }); });
    state.meetings.forEach(function (m) { if ((m.date || '') >= today) evs.push({ type: 'meeting', date: m.date, m: m }); });
    state.budget.activities.forEach(function (a) { if (a.date && a.date >= today) evs.push({ type: 'activity', date: a.date, a: a }); });
    evs.sort(function (x, y) { return x.date.localeCompare(y.date); });
    return evs.slice(0, 2);
  }

        '<div class="assign-row"><span class="assign-name">4 · Import your Trail’s End schedule</span><button type="button" class="btn small" data-act="goto-pack">Pack tab</button></div>' +
        '<div class="assign-row"><span class="assign-name">5 · Set commission &amp; goals</span><button type="button" class="btn small" data-act="tab" data-tab="budget">Budget tab</button></div>' +

    var nextUp = nextUpEvents();
    if (nextUp.length) {
      h += '<div class="card"><p class="eyebrow">Next up</p>';
      nextUp.forEach(function (e) {
        if (e.type === 'storefront') { h += storefrontRow(e.sf); return; }
        var nuLabel, nuKey;
        if (e.type === 'meeting') {
          nuLabel = e.m.kind === 'pack' ? 'Pack meeting' : ('Den meeting' + (e.m.den ? ' (' + e.m.den + ')' : ''));
          var nuTime = fmtClock(e.m.time);
          if (nuTime) nuLabel += ' · ' + nuTime;
          nuKey = 'mtg:' + e.m.id;
        } else {
          nuLabel = e.a.name || 'Activity';
          nuKey = 'act:' + e.a.id;
        }
        var nuPill = rsvpPill(nuKey);
        h += '<div class="list-row" data-act="nextup-day" data-date="' + e.date + '" role="button" tabindex="0">' +
          '<div><div class="lr-name">' + esc(nuLabel) + (nuPill ? ' ' + nuPill : '') + '</div>' +
          '<div class="small muted">' + esc(fmtDate(e.date)) + '</div></div>' +
          '<span class="muted" aria-hidden="true">›</span></div>';
      });
      h += '</div>';
    }

    h += '<div class="card"><div class="cal-head">' +
      '<button type="button" class="cal-nav" data-act="cal-prev" aria-label="Previous month">‹</button>' +
      '<span class="cal-title">' + esc(monthLabel(ui.calMonth)) + '</span>' +
      '<button type="button" class="cal-nav" data-act="cal-next" aria-label="Next month">›</button></div>' +
      '<div class="cal-grid">';
    dows.forEach(function (d) { h += '<div class="cal-dow">' + d + '</div>'; });
    for (var i = 0; i < firstDow; i++) h += '<div class="cal-cell cal-pad"></div>';
    for (var day = 1; day <= daysInMonth; day++) {
      var iso = ui.calMonth + '-' + pad2(day);
      var evs = byDay[day];
      var cls = 'cal-cell';
      if (iso === today) cls += ' today';
      if (evs) cls += ' has';
      if (iso === ui.calSelectedDate) cls += ' sel';
      var mark = '';
      if (evs) {
        var dots = evs.slice(0, 3).map(function (e) { return '<span class="cal-dot2 ' + dotClass(e) + '"></span>'; }).join('');
        mark = '<span class="cal-marks">' + dots + (evs.length > 3 ? '<span class="cal-more">+</span>' : '') + '</span>';
      }
      // Wave 18(10) — tab-stop diet: only today and days WITH events are focusable;
      // other days stay clickable through the delegated click handler (pointer users
      // get a hover affordance from the Wave-18 CSS instead).
      var focusableDay = iso === today || !!evs;
      h += '<div class="' + cls + '" data-act="cal-day" data-date="' + iso + '"' +
        (focusableDay ? ' role="button" tabindex="0" aria-label="' + esc(fmtDate(iso)) + (evs ? ', ' + evs.length + ' event' + (evs.length === 1 ? '' : 's') : '') + '"' : '') +
        '>' + day + mark + '</div>';
    }
    h += '</div>';
    h += '<div class="row small" style="gap:12px;margin-top:10px;color:var(--ink-soft)">' +
      '<span><span class="cal-dot2 dot-store"></span> Storefront (staffed)</span>' +
      '<span><span class="cal-dot2 dot-store-open"></span> open shift</span>' +
      '<span><span class="cal-dot2 dot-mtg"></span> Den meeting</span>' +
      '<span><span class="cal-dot2 dot-pack"></span> Pack meeting</span>' +
      '<span><span class="cal-dot2 dot-act"></span> Activity</span></div>';
    h += '<div class="row no-print" style="margin-top:10px">' +
      '<button type="button" class="btn small" data-act="open-digest">Copy monthly digest</button></div>';
    h += '</div>';

    // Wave 10: file-based calendar interchange with BAND (and Google/Apple/Outlook).
    h += '<div class="card no-print"><h2 class="section display">Sync with BAND</h2>' +
      '<div class="row" style="flex-wrap:wrap">' +
      '<button type="button" class="btn primary" data-act="export-ics">Download calendar (.ics)</button>' +
      '<button type="button" class="btn" data-act="import-ics">Import .ics…</button>' +
      '<input type="file" id="icsFile" accept=".ics,text/calendar" hidden>' +
      '</div>' +
      '<p class="small muted" style="margin:8px 0 0">Export a .ics and import it into BAND on a computer ' +
      '(band.us → Event → ⋯ → Import Events), or subscribe in Google/Apple/Outlook. Import brings a .ics ' +
      'from BAND back in as dated activities you can adjust. BAND has no live sync, so this is a file you ' +
      'move over — and only dated events (storefronts, meetings, dated activities) export.</p></div>';

    // Selected-day detail
    h += '<div class="card">';
    if (ui.calSelectedDate) {
      var selDay = byDay[+ui.calSelectedDate.split('-')[2]];
      var onThisMonth = monthKey(ui.calSelectedDate) === ui.calMonth;
      h += '<h2 class="section display" style="margin-bottom:8px">' + esc(fmtDate(ui.calSelectedDate)) + '</h2>';
      if (onThisMonth && selDay) {
        selDay.forEach(function (e) {
          if (e.type === 'storefront') h += storefrontRow(e.sf);
          else if (e.type === 'activity') {
            var actPill = rsvpPill('act:' + e.a.id);
            h += '<div class="ev"><div class="row" style="gap:6px;flex-wrap:wrap;align-items:center">' +
              '<span class="ev-badge badge-act">Activity</span>' + (actPill ? ' ' + actPill : '') + '</div>' +
              '<div class="arow" style="margin-top:6px">' +
              '<input class="aname" data-ch="act-name" data-id="' + e.a.id + '" value="' + esc(e.a.name) + '" placeholder="Activity name">' +
              '<input type="date" class="adate" data-ch="act-date" data-id="' + e.a.id + '" value="' + esc(e.a.date || '') + '" aria-label="Date (optional)">' +
              '<input class="money-in" inputmode="decimal" data-ch="act-est" data-id="' + e.a.id + '" value="' + dollars(e.a.estCents) + '" placeholder="Est." aria-label="Estimated cost">' +
              tinyDangerBtn('del-activity:' + e.a.id, 'Remove activity') +
              '</div>' +
              renderRsvpBlock('act:' + e.a.id) + '</div>';
          } else h += renderMeetingRow(e.m);
        });
      } else {
        h += '<p class="small muted">Nothing scheduled yet.</p>';
      }
      h += '<div class="row" style="margin-top:10px;flex-wrap:wrap">' +
        '<button type="button" class="btn small" data-act="add-meeting" data-kind="den" data-date="' + ui.calSelectedDate + '">+ Den meeting</button>' +
        '<button type="button" class="btn small" data-act="add-meeting" data-kind="pack" data-date="' + ui.calSelectedDate + '">+ Pack meeting</button>' +
        '<button type="button" class="btn small" data-act="add-storefront-day" data-date="' + ui.calSelectedDate + '">+ Storefront</button>' +
        '<button type="button" class="btn small" data-act="add-activity-day" data-date="' + ui.calSelectedDate + '">+ Activity</button>' +
        '</div>';
    } else {
      h += '<h2 class="section display" style="margin-bottom:6px">Plan the month</h2>' +
        '<p class="small muted">Tap any day to see what’s scheduled and to add a den or pack meeting. Storefronts come from the Storefronts tab; activities with a date come from the Budget tab.</p>' +
        '<div class="row" style="margin-top:10px">' + seedBtn() + '</div>' +
        '<p class="small muted" style="margin:6px 0 0">New program year? Seed the traditional slate of pack activities — no dates yet; set them on the Budget tab when they’re known.</p>';
    }
    h += '</div>';

    // Any activities without a date yet — shown regardless of the viewed month.
    var undated = state.budget.activities.filter(function (a) { return !a.date; })
      .sort(function (a, b) { return a.slot - b.slot; });
    if (undated.length) {
      h += '<div class="card"><h2 class="section display">Activities to schedule</h2>' +
        '<p class="small muted" style="margin:0 0 8px">Seeded and planned activities without a date yet — pick a date to place them on the calendar.</p>';
      var undSlot = -1;
      undated.forEach(function (a) {
        if (a.slot !== undSlot) {
          undSlot = a.slot;
          h += '<div class="small muted" style="margin:8px 0 2px;font-weight:650">' + esc(slotLabel(a.slot)) + '</div>';
        }
        h += '<div class="arow">' +
          '<input class="aname" data-ch="act-name" data-id="' + a.id + '" value="' + esc(a.name) + '" placeholder="Activity name">' +
          '<input type="date" class="adate" data-ch="act-date" data-id="' + a.id + '" value="" aria-label="Pick a date">' +
          tinyDangerBtn('del-activity:' + a.id, 'Remove activity') +
          '</div>';
      });
      h += '</div>';
    }
    return h;
  }

  // Adventure suggestions for a den meeting: the den's official required + elective
  // adventures; "All dens" meetings offer the union across ranks. Free text is allowed.
  function advOptionsForDen(den) {
    var names = [], seen = {};
    var ranks = den && ADVENTURES[den] ? [den] : DENS;
    ranks.forEach(function (r) {
      var a = ADVENTURES[r];
      if (!a) return;
      a.required.concat(a.electives).forEach(function (n) {
        if (!seen[n]) { seen[n] = 1; names.push(n); }
      });
    });
    return names;
  }

  function renderMeetingRow(m) {
    // Wave 19(23): the den select below is RANK-based (DENS) on purpose — a scout's
    // free-text denLabel is display-only; meetings, advancement grouping, and the
    // attendance den-filter all key off s.den (the rank).
    return '<div class="ev ev-meeting">' +
      '<div class="row" style="gap:6px;flex-wrap:wrap;align-items:center">' +
      '<span class="ev-badge ' + (m.kind === 'pack' ? 'badge-pack' : 'badge-den') + '">' + (m.kind === 'pack' ? 'Pack' : 'Den') + '</span>' +
      rsvpPill('mtg:' + m.id) +
      '<select data-ch="mtg-kind" data-id="' + m.id + '"><option value="den"' + (m.kind === 'den' ? ' selected' : '') + '>Den meeting</option><option value="pack"' + (m.kind === 'pack' ? ' selected' : '') + '>Pack meeting</option></select>' +
      (m.kind === 'den' ? '<select data-ch="mtg-den" data-id="' + m.id + '"><option value="">All dens</option>' + DENS.map(function (d) { return '<option value="' + d + '"' + (m.den === d ? ' selected' : '') + '>' + d + '</option>'; }).join('') + '</select>' : '') +
      '<input type="time" class="time-in" data-ch="mtg-time" data-id="' + m.id + '" value="' + esc(m.time || '') + '" aria-label="Meeting time">' +
      tinyDangerBtn('del-meeting:' + m.id, 'Remove meeting') +
      '</div>' +
      (m.kind === 'den'
        ? '<input data-ch="mtg-adv" data-id="' + m.id + '" list="advOpts-' + m.id + '" value="' + esc(m.adventure || '') + '" placeholder="Adventure planned (optional)" style="width:100%;margin-top:6px">' +
          '<datalist id="advOpts-' + m.id + '">' + advOptionsForDen(m.den).map(function (n) { return '<option value="' + esc(n) + '">'; }).join('') + '</datalist>'
        : '') +
      '<input data-ch="mtg-note" data-id="' + m.id + '" value="' + esc(m.note || '') + '" placeholder="Location / notes (optional)" style="width:100%;margin-top:6px">' +
      '<div class="row" style="margin-top:8px;align-items:flex-start">' +
      renderRsvpBlock('mtg:' + m.id) + renderAttendanceBlock(m) +
      '</div>' +
      renderMeetingAdvMark(m) +
      // Wave 19(22) — one-time weekly-repeat offer, only on the just-added meeting.
      // Bulk-create like the storefront "Add weekly" — no recurrence model.
      (ui.repeatOffer === m.id
        ? '<form data-form="mtg-repeat" data-id="' + m.id + '" class="row no-print" style="margin-top:8px">' +
          '<label class="fld">Repeat weekly ×<input class="weight-in" type="number" name="weeks" min="1" max="12" step="1" inputmode="numeric" value="4"></label>' +
          '<button class="btn small" type="submit" style="align-self:flex-end">Repeat weekly</button>' +
          '<button type="button" class="btn small ghost" data-act="mtg-repeat-dismiss" style="align-self:flex-end">No thanks</button>' +
          '</form>'
        : '') +
      '</div>';
  }

  // Wave 16 — one-tap "mark the planned adventure done for everyone checked in".
  // Only on den meetings with an adventure set and ≥1 attendance mark. Additive and
  // reversible cell-by-cell on the Advancement tab, so no two-tap arm.
  function renderMeetingAdvMark(m) {
    if (m.kind !== 'den') return '';
    var advName = String(m.adventure || '').trim();
    if (!advName) return '';
    advName = ADV_RENAMES[advName] || advName;
    var marked = state.attendance[m.id] || {};
    var checked = Object.keys(marked).filter(function (sid) { return marked[sid] === true && getScout(sid); });
    if (!checked.length) return '';
    var pending = checked.filter(function (sid) {
      return !advStatus(sid, advKindFor(getScout(sid), advName), advName);
    });
    if (!pending.length) {
      return '<p class="small muted" style="margin:8px 0 0">“' + esc(advName) + '” recorded for everyone checked in.</p>';
    }
    return '<div class="row" style="margin-top:8px"><button type="button" class="btn small" data-act="mtg-adv-mark" data-id="' + m.id + '">' +
      'Mark “' + esc(advName) + '” done for the ' + checked.length + ' checked in</button></div>';
  }

  /* ----- Storefront detail ----- */
  function renderStorefrontDetail() {
    var sf = getStorefront(ui.storefrontId);
    if (!sf) { ui.storefrontId = null; return renderStorefrontList(); }
    var t = storefrontTotals(sf);
    var h = '<div class="row" style="margin-bottom:10px">' +
      '<button type="button" class="btn ghost" data-act="back">&larr; All storefronts</button>' +
      // Wave 19(15) — printable per-storefront day sheet.
      '<button type="button" class="btn small" data-act="sf-day-sheet" data-id="' + sf.id + '">Day sheet</button></div>';

    h += '<div class="card"><div class="spread">' +
      '<div class="row">' +
      '<label class="fld">Store / location<input data-ch="sf-name" data-id="' + sf.id + '" value="' + esc(sf.name) + '" style="width:200px"></label>' +
      '<label class="fld">Date<input type="date" data-ch="sf-date" data-id="' + sf.id + '" value="' + esc(sf.date) + '"></label>' +
      '</div>' + dangerBtn('del-sf:' + sf.id, 'Delete storefront') + '</div>' +
      '<div class="row" style="margin-top:10px">' +
      '<div class="stat"><span class="v money">' + fmt(t.sales) + '</span><span class="l">Sales</span></div>' +
      '<div class="stat"><span class="v money">' + fmt(t.don) + '</span><span class="l">Donations</span></div>' +
      '<div class="stat"><span class="v money">' + fmt(t.combined) + '</span><span class="l">Combined</span></div>' +
      '</div></div>';

    // Wave 2 — RSVP / headcount for this storefront shift
    h += '<div class="card"><p class="eyebrow">RSVP / headcount</p>' + renderRsvpBlock('sf:' + sf.id) + '</div>';

    sf.blocks.forEach(function (b) { h += renderBlock(sf, b); });
    h += '<button type="button" class="btn" data-act="add-block" data-id="' + sf.id + '">+ Add another block</button>';
    return h;
  }

  function renderBlock(sf, b) {
    var roster = activeScouts();
    var assignedIds = b.assignments.map(function (a) { return a.scoutId; });
    var addable = roster.filter(function (s) { return assignedIds.indexOf(s.id) === -1; });
    var shares = blockShares(b);
    var hasMoney = (b.salesCents || 0) + (b.donationsCents || 0) > 0;

    var h = '<div class="card"><div class="spread">' +
      '<div class="row">' +
      '<label class="fld">Block name<input data-ch="b-label" data-sf="' + sf.id + '" data-id="' + b.id + '" value="' + esc(b.label) + '" style="width:110px"></label>' +
      '<label class="fld">Start<input type="time" class="time-in" data-ch="b-start" data-sf="' + sf.id + '" data-id="' + b.id + '" value="' + esc(b.start) + '" aria-label="Block start time"></label>' +
      '<label class="fld">End<input type="time" class="time-in" data-ch="b-end" data-sf="' + sf.id + '" data-id="' + b.id + '" value="' + esc(b.end) + '" aria-label="Block end time"></label>' +
      '</div>' + dangerBtn('del-block:' + sf.id + ':' + b.id, 'Remove block') + '</div>' +
      (function () { var rng = fmtTimeRange(b.start, b.end); return rng ? '<div class="small muted" style="margin-top:2px">' + esc(rng) + '</div>' : ''; })();

    // Assignments
    h += '<div class="block-card"><p class="eyebrow">Scouts on this block</p>';
    if (!b.assignments.length) h += '<p class="small muted" style="margin:4px 0 8px">No scouts assigned yet.</p>';
    b.assignments.forEach(function (a) {
      var s = getScout(a.scoutId);
      h += '<div class="assign-row">' +
        '<span class="assign-name">' + esc(s ? s.name : 'Unknown scout') + '</span>' +
        '<label class="fld" style="flex-direction:row;align-items:center;gap:6px">Weight' +
        '<input class="weight-in" type="number" min="0" step="0.25" inputmode="decimal" data-ch="weight" data-sf="' + sf.id + '" data-id="' + b.id + '" data-scout="' + a.scoutId + '" value="' + a.weight + '"></label>' +
        '<button type="button" class="btn small ghost danger" data-act="unassign" data-sf="' + sf.id + '" data-id="' + b.id + '" data-scout="' + a.scoutId + '" aria-label="Remove ' + esc(s ? s.name : 'scout') + ' from block">Remove</button>' +
        '</div>';
    });
    if (addable.length) {
      h += '<div class="row" style="margin-top:8px"><select data-ch="assign" data-sf="' + sf.id + '" data-id="' + b.id + '">' +
        '<option value="">+ Assign a scout…</option>' +
        addable.map(function (s) { return '<option value="' + s.id + '">' + esc(s.name) + '</option>'; }).join('') +
        '</select></div>';
    } else if (!roster.length) {
      h += '<p class="small muted" style="margin-top:8px">Add scouts on the Scouts tab first.</p>';
    }
    h += '</div>';

    // Wave 16 — adults staffing this block (two-deep leadership)
    var adultsOn = blockAdultLeaders(b);
    var addableAdults = state.leaders.filter(function (l) { return (b.adults || []).indexOf(l.id) === -1; });
    h += '<div class="block-card" style="margin-top:8px"><p class="eyebrow">Adults on this block</p>';
    if (!state.leaders.length) {
      h += '<p class="small muted" style="margin:4px 0 0">Add leaders on the Pack tab to staff blocks.</p>';
    } else {
      if (adultsOn.length) {
        h += '<div class="row" style="gap:6px;margin:6px 0 0">' + adultsOn.map(function (l) {
          var rmLbl = 'Remove ' + (l.name || 'leader') + ' from this block';
          return '<span class="adult-chip">' + esc(l.name || 'Leader') +
            '<button type="button" class="btiny" data-act="adult-remove" data-sf="' + sf.id + '" data-id="' + b.id +
            '" data-adult="' + l.id + '" aria-label="' + esc(rmLbl) + '" title="' + esc(rmLbl) + '">✕</button></span>';
        }).join('') + '</div>';
      } else {
        h += '<p class="small muted" style="margin:4px 0 0">No adults assigned yet.</p>';
      }
      if (addableAdults.length) {
        h += '<div class="row" style="margin-top:8px"><select data-ch="adult-assign" data-sf="' + sf.id + '" data-id="' + b.id + '" aria-label="Add an adult to this block">' +
          '<option value="">+ Add adult…</option>' +
          addableAdults.map(function (l) {
            return '<option value="' + l.id + '">' + esc(l.name || 'Leader') + (l.role ? ' — ' + esc(l.role) : '') + '</option>';
          }).join('') +
          '</select></div>';
      }
    }
    h += '</div>';
    if (blockNeedsAdults(b)) {
      var adultN = adultsOn.length;
      h += '<p class="warn" style="margin:10px 0 0">Two-deep leadership: this block has scouts but only ' + adultN + ' adult' + (adultN === 1 ? '' : 's') + ' assigned.</p>';
    }

    // Money entry (Wave 17 — "of which card" is a cash-box reconciliation aid only;
    // no other math consumes it)
    h += '<div class="row" style="margin-top:12px">' +
      '<label class="fld">Total sales ($)<input class="money-in" inputmode="decimal" data-ch="b-sales" data-sf="' + sf.id + '" data-id="' + b.id + '" value="' + dollars(b.salesCents) + '" placeholder="0.00"></label>' +
      '<label class="fld">Total donations ($)<input class="money-in" inputmode="decimal" data-ch="b-don" data-sf="' + sf.id + '" data-id="' + b.id + '" value="' + dollars(b.donationsCents) + '" placeholder="0.00"></label>' +
      '<label class="fld">Of which card ($)<input class="money-in" inputmode="decimal" data-ch="b-card" data-sf="' + sf.id + '" data-id="' + b.id + '" value="' + dollars(b.cardCents) + '" placeholder="0.00"></label>' +
      '</div>';
    if (b.cardCents > 0) {
      var blockTotal = (b.salesCents || 0) + (b.donationsCents || 0);
      h += b.cardCents > blockTotal
        ? '<p class="small" style="margin:6px 0 0;color:var(--bad)">card exceeds this block’s total — check amounts</p>'
        : '<p class="small muted money" style="margin:6px 0 0">cash ≈ ' + fmt(blockTotal - b.cardCents) + '</p>';
    }

    if (hasMoney && !b.assignments.length) {
      h += '<p class="warn" style="margin:10px 0 0">Money is entered but no scouts are assigned — nobody is getting credit for this block yet.</p>';
    }
    if (shares.length && hasMoney) {
      h += '<div class="tbl-wrap" style="margin-top:10px"><table>' +
        '<thead><tr><th scope="col">Scout</th><th scope="col" class="num">Weight</th><th scope="col" class="num">Sales share</th><th scope="col" class="num">Donation share</th></tr></thead><tbody>';
      shares.forEach(function (sh) {
        var s = getScout(sh.scoutId);
        h += '<tr><td>' + esc(s ? s.name : '?') + '</td><td class="num">' + sh.weight + '</td>' +
          '<td class="num">' + fmt(sh.sales) + '</td><td class="num">' + fmt(sh.don) + '</td></tr>';
      });
      h += '</tbody></table></div>';
    }
    h += '</div>';
    return h;
  }

  /* ----- Scouts tab ----- */
  function renderScouts() {
    var totals = computeScoutTotals();
    var h = '';
    if (canEdit()) {
      h += '<div class="card"><h2 class="section display">Add a scout</h2>' +
        '<form data-form="add-scout" class="row">' +
        '<label class="fld">Name<input name="name" required placeholder="Scout name" style="width:180px"></label>' +
        '<label class="fld">Den (optional)<select name="den"><option value="">No den</option>' +
        DENS.map(function (d) { return '<option value="' + d + '">' + d + '</option>'; }).join('') +
        '</select></label>' +
        '<button class="btn primary" type="submit" style="align-self:flex-end">Add</button>' +
        '</form></div>';
    }

    var active = activeScouts();
    var archived = state.scouts.filter(function (s) { return s.archived; });

    if (!state.scouts.length) {
      h += '<div class="empty">No scouts yet. Add your pack roster above.</div>';
      return h;
    }

    h += '<div class="card"><h2 class="section display">Roster <span class="pill navy">' + active.length + ' active</span></h2>';
    active.forEach(function (s) { h += renderScoutRow(s, totals[s.id]); });
    if (!active.length) h += '<p class="small muted">Everyone is archived.</p>';
    h += '</div>';

    if (archived.length) {
      h += '<div class="card"><div class="spread"><h2 class="section display" style="margin-bottom:0">Archived <span class="pill navy">' + archived.length + '</span></h2>' +

    h += '<p class="eyebrow">Add wagon or online sales</p>' +

      h += '<div class="tbl-wrap"><table><thead><tr><th scope="col">Date</th><th scope="col">Type</th><th scope="col" class="num">Sales</th><th scope="col" class="num">Donations</th><th scope="col"></th></tr></thead><tbody>';

  /* ----- Standings tab (internal id 'totals') ----- */
  function visibleScoutRows(totals) {
    return state.scouts.map(function (s) {
      return { name: s.name, den: s.den, archived: s.archived, t: totals[s.id] };
    }).filter(function (r) { return !r.archived || r.t.combined > 0 || r.t.blocks > 0; });
  }
  function rankBy(rows, val) {
    return rows.slice().sort(function (a, b) { return val(b) - val(a) || a.name.localeCompare(b.name); });
  }
  // The two standings boards: primary = sales + online donations,
  // secondary = cash donations credited to the scout (storefront split + wagon scout-level).
  function eligibleOf(r) { return r.t.sales + r.t.onD; }
  function cashDonOf(r) { return r.t.storeD + r.t.wagonD; }
  // Goal progress base — adds the scout's cash donations only when the goal toggle is on.
  function goalBaseOf(r) { return r.t.sales + r.t.onD + (state.cashThroughTrailsEnd ? cashDonOf(r) : 0); }

  /* ----- Wave 8: reward tiers (dues covered by the pack) ----- */
  // Tiers earned on the SAME base as goal progress (goalBaseOf). Always work off a copy
  // sorted ascending by threshold so display + logic agree without mutating stored order.
  function sortedTiers() {
    return state.rewardTiers.tiers.slice().sort(function (a, b) {
      return a.thresholdCents - b.thresholdCents || String(a.id).localeCompare(String(b.id));
    });
  }
  // Highest tier whose threshold ≤ base (tiers must be ascending); null if below tier 1.
  function earnedTier(base, tiers) {
    var earned = null;
    for (var i = 0; i < tiers.length; i++) {
      if (base >= tiers[i].thresholdCents) earned = tiers[i];
      else break;
    }
    return earned;
  }
  // One roll-up reused by the budget, the Totals card, and the standings badges.
  // coveredCount = active scouts whose base ≥ the lowest (dues) tier's threshold.
  function rewardTierSummary() {
    var tiers = sortedTiers();
    var duesCents = state.rewardTiers.duesCents || 0;
    var duesTier = tiers.length ? tiers[0] : null;
    var totals = computeScoutTotals();
    var roster = activeScouts();
    var coveredCount = 0;
    var perTierCounts = {};
    tiers.forEach(function (t) { perTierCounts[t.id] = 0; });
    roster.forEach(function (s) {
      var base = goalBaseOf({ t: totals[s.id] });
      var et = earnedTier(base, tiers);
      if (et) perTierCounts[et.id] += 1;
      if (duesTier && base >= duesTier.thresholdCents) coveredCount += 1;
    });
    return {
      tiers: tiers, duesCents: duesCents, duesTier: duesTier,
      coveredCount: coveredCount, rewardDues: coveredCount * duesCents,
      perTierCounts: perTierCounts, activeCount: roster.length
    };
  }
  // Standings badges for one row: earned-tier name (navy) + gold "dues covered" marker.
  function tierBadgesFor(r, tiers, duesTier) {
    if (!tiers.length || r.archived) return '';
    var base = goalBaseOf(r);
    var et = earnedTier(base, tiers);
    if (!et) return '';
    var html = ' <span class="pill navy">' + esc(et.name || 'Tier') + '</span>';
    if (duesTier && base >= duesTier.thresholdCents) html += ' <span class="pill">🎟 Dues covered</span>';
    return html;
  }

  // Wave 19(4) — shared renewal-due predicate ('YYYY-MM' month has arrived or passed).
  // Used by the leader pills, the scout roster pills, and the monthly digest.
  function renewalDue(month) { return !!month && month <= monthKey(todayISO()); }
  // Wave 19(20) — computed SYT expiry: a completed-on date + 1 year wins; the legacy
  // free-text sytExpiry keeps working when no completed date is set. '' when neither.
  // (Date() handles the Feb-29 → Mar-1 rollover for us.)
  function sytExpiryOf(l) {
    var c = l.sytCompleted;
    if (c && /^\d{4}-\d{2}-\d{2}$/.test(c)) {
      var p = c.split('-');
      var d = new Date(+p[0] + 1, +p[1] - 1, +p[2]);
      return d.getFullYear() + '-' + pad2(d.getMonth() + 1) + '-' + pad2(d.getDate());
    }
    return l.sytExpiry || '';
  }
  // Status pills are computed at render time, never stored.
  // Wave 19(20) — expiry pills work off the COMPUTED expiry (completed+1yr, legacy fallback).
  function leaderStatus(l) {
    var pills = [];
    var today = todayISO();
    var exp = sytExpiryOf(l);
    if (exp) {
      if (exp < today) pills.push({ cls: ' bad', label: 'Training expired' });
      else {
        var d = new Date();
        d.setDate(d.getDate() + 60);
        var soon = d.getFullYear() + '-' + pad2(d.getMonth() + 1) + '-' + pad2(d.getDate());
        if (exp <= soon) pills.push({ cls: '', label: 'Expires soon' });
      }
    }
    if (renewalDue(l.renewalMonth)) pills.push({ cls: '', label: 'Renewal due' });
    return pills;
  }

        '<p class="small muted" style="margin:6px 0 0">Imported ' + esc(fmtArchiveDate(a.importedAt)) + ' · ' +
        a.scouts.length + ' scout' + (a.scouts.length === 1 ? '' : 's') + ' · Online ' + fmt(a.channel.onlineCents) +
        ' · Wagon ' + fmt(a.channel.wagonCents) + ' · Storefront ' + fmt(a.channel.storefrontCents) + '</p>';
      if (open) {
        h += '<div style="margin-top:10px">' + archiveTables(a) + '</div>' +

          '<button type="button" class="btn small" data-act="archive-sheet:' + a.id + '">Print / Copy</button></div>';
      }
      h += '</div>';
    });
    return h + '</div>';
  }

  function renderTotals() {

      '<div class="stat"><span class="v money" style="color:var(--accent-text)">' + (pack.commission == null ? '—' : fmt(pack.commission)) + '</span>' +
      '<span class="l">Pack commission</span></div>' +
      '</div>' +
      // Wave 17 — the money settings moved to Season setup; this tab is read-only standings.

        '<p class="small" style="margin:6px 0 0"><strong class="money">' + fmt(pack.teEligible) + '</strong> of <span class="money">' + fmt(pack.teGoal) + '</span> (' + tePct + '%)' +

        '</p>';
    }

        '<thead><tr><th scope="col">Storefront</th><th scope="col">Date</th><th scope="col" class="num">Sales</th><th scope="col" class="num">Donations</th><th scope="col" class="num">Combined</th></tr></thead><tbody>';
      state.storefronts.forEach(function (sf) {

    // Season comparison by location

        '<div class="tbl-wrap"><table><caption class="visually-hidden">Standings — cash donations</caption><thead><tr><th scope="col"></th><th scope="col">Scout</th><th scope="col" class="num">Storefront</th><th scope="col" class="num">Wagon</th><th scope="col" class="num">Total cash</th></tr></thead><tbody>';
      rankBy(rows, cashDonOf).forEach(function (r, i) {
        h += '<tr><td class="num muted">' + (i + 1) + '</td><td>' + esc(r.name) + (r.archived ? ' <span class="pill navy">archived</span>' : '') + '</td>' +
          '<td class="num">' + fmt(r.t.storeD) + '</td><td class="num">' + fmt(r.t.wagonD) + '</td>' +
          '<td class="num" style="font-weight:650">' + fmt(cashDonOf(r)) + '</td></tr>';
      });
      h += '</tbody></table></div>' +
        '<p class="small muted" style="margin:8px 0 0">Cash donations credited to each scout — their split of storefront-table donations plus wagon donations logged to them (wagon isn’t split).</p></div>';
    }

    // Wave 4: other fundraisers — a standalone side-ledger below the popcorn content.
    // (Wave 17 — the Share & backup card moved to the Pack tab, next to the sync card.)
    h += renderFundraisers();
    return h;

  /* ----- Wave 4: other fundraisers (standalone side-ledger) ----- */
  // Total raised across ALL sales, plus per-active-scout credited totals. Sales logged to a
  // now-archived/deleted scout still count in the total but drop out of the standings — the
  // same way pack totals sum source records while standings filter to the roster.
  function fundraiserTotals(fr) {
    var perScout = {};
    activeScouts().forEach(function (s) { perScout[s.id] = 0; });
    var total = 0;
    fr.sales.forEach(function (sale) {
      total += sale.cents;
      if (perScout[sale.scoutId] != null) perScout[sale.scoutId] += sale.cents;
    });
    return { total: total, perScout: perScout };
  }
  function renderFundraisers() {
    var roster = activeScouts();
    var h = '<div class="card"><h2 class="section display">Other fundraisers</h2>' +
      '<p class="small muted" style="margin:0 0 10px">A simple side-ledger for secondary fundraisers (camp cards, wreaths, etc.). ' +

      '<label class="fld">Fundraiser<input name="name" required placeholder="Camp Cards 2026" style="width:200px"></label>' +
      '<label class="fld">Goal ($, optional)<input class="money-in" inputmode="decimal" name="goal" placeholder="0.00"></label>' +
      '<button class="btn primary" type="submit" style="align-self:flex-end">Add fundraiser</button>' +
      '</form>';

      h += '<div class="empty" style="margin:12px 0 0">No other fundraisers yet. Add one above to track camp cards, wreaths, or any non-popcorn sale.</div>';
      return h + '</div>';

    state.fundraisers.forEach(function (fr) { h += renderFundraiserCard(fr, roster); });

  }
  function renderFundraiserCard(fr, roster) {

    // Editable goal (live money field, same pattern as the popcorn goals).
    h += '<label class="fld" style="margin:0 0 8px">Goal ($, optional)<input class="money-in" inputmode="decimal" data-ch="fr-goal" data-id="' + fr.id +
      '" value="' + dollars(fr.goalCents) + '" placeholder="0.00"></label>';

    // Wave 17 — opt this fundraiser's total into the Budget's funds-in (default off).
    h += '<div class="row" style="margin:0 0 8px"><label class="perscout"><input type="checkbox" data-ch="fr-count" data-id="' + fr.id + '"' +
      (fr.countInFunds ? ' checked' : '') + '> count toward Budget funds-in</label></div>';

    // Standings — active scouts ranked by amount raised for THIS fundraiser.
    if (roster.length) {
      var ranked = roster.map(function (s) { return { name: s.name, raised: ft.perScout[s.id] || 0 }; })
        .sort(function (a, b) { return b.raised - a.raised || a.name.localeCompare(b.name); });
      h += '<div class="tbl-wrap"><table><thead><tr><th scope="col"></th><th scope="col">Scout</th><th scope="col" class="num">Raised</th>' +
        (showGoal ? '<th scope="col" class="num">Goal</th>' : '') + '</tr></thead><tbody>';
      ranked.forEach(function (r, i) {
        var goalCell = '';
        if (showGoal) {
          var gp = Math.round(r.raised / perTarget * 100);
          goalCell = '<td class="num' + (gp >= 100 ? '" style="color:var(--good);font-weight:650' : '') + '">' + gp + '%</td>';
        }
        h += '<tr><td class="num muted">' + (i + 1) + '</td><td>' + esc(r.name) + '</td>' +
          '<td class="num" style="font-weight:650">' + fmt(r.raised) + '</td>' + goalCell + '</tr>';
      });
      h += '</tbody></table></div>';
    }

    // Sale log — lets a mistaken entry be removed without nuking the fundraiser.
    var sales = fr.sales.slice().sort(function (a, b) { return (b.date || '').localeCompare(a.date || ''); });
    if (sales.length) {
      h += '<div class="tbl-wrap" style="margin-top:8px"><table><thead><tr><th scope="col">Date</th><th scope="col">Scout</th><th scope="col">Note</th><th scope="col" class="num">Amount</th><th scope="col"></th></tr></thead><tbody>';
      sales.forEach(function (sale) {
        var sc = getScout(sale.scoutId);
        h += '<tr><td>' + esc(fmtDate(sale.date) || '—') + '</td>' +
          '<td>' + esc(sc ? sc.name : '—') + '</td>' +
